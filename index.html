              const pct=cpData.pct||0;
              const done=pct>=100;
              return(
                <div key={ch.id} style={{background:done?`linear-gradient(135deg,#0a2040,#0d2c50)`:C.card,border:`1px solid ${done?C.blue:isJoined?C.orange:C.border}`,borderRadius:12,padding:18,marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{flex:1}}><div style={{fontFamily:"Impact,sans-serif",fontSize:18,color:done?C.wave:C.white,letterSpacing:2}}>{ch.title}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{ch.desc}</div>{ch.start&&<div style={{fontSize:10,color:C.dim,marginTop:3}}>{ch.start} → {ch.end||"ongoing"}</div>}</div>
                    <div style={{fontSize:28,marginLeft:10}}>{done?ch.badge:"🎯"}</div>
                  </div>
                  {isJoined&&<div style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                      <span style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1}}>YOUR PROGRESS</span>
                      {isLoadingProg?<span style={{fontSize:10,color:C.dim}}>loading…</span>:<span style={{fontSize:11,fontWeight:700,color:done?C.wave:C.orange}}>{prog.toFixed(1)} / {ch.goal} {ch.unit}</span>}
                    </div>
                    <div style={{height:9,background:C.bg,borderRadius:5,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:done?`linear-gradient(90deg,${C.blue},${C.wave})`:`linear-gradient(90deg,${C.orange},#e08040)`,borderRadius:5,transition:"width 1.2s ease"}}/></div>
                    {!isLoadingProg&&isJoined&&<div style={{fontSize:10,color:C.dim,marginTop:4}}>{dispDist(cpData.miles||0,du)} {du} · {(cpData.tonnage||0).toFixed(0)} lbs tonnage · {cpData.rucks||0} rucks logged in window</div>}
                  </div>}
                  {done?<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"rgba(26,95,168,0.18)",borderRadius:7}}><span>🏅</span><span style={{fontWeight:700,fontSize:12,color:C.wave}}>BADGE EARNED!</span></div>:isJoined?<div style={{fontSize:11,color:C.dim,marginTop:4}}>{(ch.goal-prog).toFixed(1)} {ch.unit} to go — keep rucking!</div>:(
                    <button onClick={()=>{(async()=>{
  await supabase.from("challenge_joins").upsert({user_id:session.user.id,challenge_id:ch.id},{onConflict:"user_id,challenge_id"});
  setJoined(p=>[...p,ch.id]);
  notify("✅ Challenge joined! Get after it! 🎒","success");
  addNotif(`You joined the challenge: ${ch.title} 🎯`,"🎯");
  loadChallengeProgress(ch);
  loadChallengeLeaderboard(ch);
})();}} style={{width:"100%",background:`linear-gradient(135deg,${C.blue},#0e2a50)`,border:"none",borderRadius:8,padding:"10px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:15,letterSpacing:2,cursor:"pointer",marginTop:4}}>JOIN CHALLENGE 🎯</button>
                  )}
                  {/* MINI LEADERBOARD inside challenge card */}
                  {isJoined&&(()=>{
                    const entries=challengeLeaderboards[ch.id]||[];
                    const unitLabel=ch.unit==="miles"?du:ch.unit==="km"?"km":ch.unit==="tonnage"?"lbs":ch.unit==="rucks"?"rucks":"mi";
                    return <div style={{marginTop:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                        <span style={{fontSize:10,fontWeight:700,color:C.wave,letterSpacing:2}}>🏆 COMPETITORS</span>

                      </div>
                      {entries.length===0?<div style={{textAlign:"center",padding:"10px",color:C.dim,fontSize:12,background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>No one else has joined yet — invite your crew!</div>:
                      <div style={{background:C.bg,borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`}}>
                        {entries.map((u,i)=>{
                          const dispProg=ch.unit==="miles"?dispDist(u.prog,du):ch.unit==="km"?u.prog.toFixed(2):ch.unit==="tonnage"?dispW(u.prog,wu):u.prog.toFixed(0);
                          return <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:u.id===session.user.id?"rgba(26,95,168,0.12)":"transparent",borderBottom:i<entries.length-1?`1px solid ${C.border}`:"none"}}>
                            <div style={{width:22,textAlign:"center",fontFamily:"Impact,sans-serif",fontSize:16,color:i===0?C.orange:i===1?"#b8c8d8":i===2?C.gold:C.dim}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
                            <Av emoji={u.avatar_emoji} size={28}/>
                            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:12,color:u.id===session.user.id?C.wave:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.full_name||u.username}{u.id===session.user.id&&" (You)"}</div></div>
                            <div style={{textAlign:"right",flexShrink:0}}>
                              <div style={{fontFamily:"Impact,sans-serif",fontSize:14,color:i===0?C.orange:C.wave}}>{dispProg} {unitLabel}</div>
                              <div style={{fontSize:9,color:u.pct>=100?C.green:C.muted}}>{u.pct.toFixed(0)}%</div>
                            </div>
                          </div>;
                        })}
                      </div>}
                    </div>;

              );
            })}

            return <div style={{padding:20,animation:"fi 0.35s ease"}}>

              {lbTab==="tonnage"&&<div>

                    <div key={u.id} onClick={()=>{setViewProf(u.id);setTab("profile");}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:i===0?"rgba(212,96,26,0.10)":u.id===session.user.id?"rgba(26,95,168,0.08)":"transparent",borderBottom:i<lbTon.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}>
                      <div style={{width:26,textAlign:"center",fontFamily:"Impact,sans-serif",fontSize:20,color:i===0?C.orange:i===1?"#b8c8d8":i===2?C.gold:C.dim}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
                      <Av emoji={u.avatar_emoji} size={36}/>
                      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:u.id===session.user.id?C.wave:C.white}}>{u.full_name||u.username}{u.id===session.user.id&&" (You)"}</div><div style={{fontSize:10,color:C.muted}}>@{u.username}</div></div>
                      <div style={{fontFamily:"Impact,sans-serif",fontSize:19,color:i===0?C.orange:C.wave}}>{(u.total_tonnage||0).toFixed(0)} lbs</div>
                    </div>
                  ))}
                </div>
              </div>}
              {/* MONTHLY DISTANCE */}
              {lbTab==="monthly"&&<div>
                <div style={{fontFamily:"Impact,sans-serif",fontSize:17,letterSpacing:3,color:C.wave,marginBottom:12}}>📍 THIS MONTH'S DISTANCE</div>
                <div style={{background:C.card,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
                  {lbMi.length===0?<div style={{padding:20,textAlign:"center",color:C.dim,fontSize:13}}>No data yet!</div>:lbMi.map((u,i)=>(
                    <div key={u.id} onClick={()=>{setViewProf(u.id);setTab("profile");}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:i===0?"rgba(212,96,26,0.10)":u.id===session.user.id?"rgba(26,95,168,0.08)":"transparent",borderBottom:i<lbMi.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}>
                      <div style={{width:26,textAlign:"center",fontFamily:"Impact,sans-serif",fontSize:20,color:i===0?C.orange:i===1?"#b8c8d8":i===2?C.gold:C.dim}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
                      <Av emoji={u.avatar_emoji} size={36}/>
                      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:u.id===session.user.id?C.wave:C.white}}>{u.full_name||u.username}{u.id===session.user.id&&" (You)"}</div><div style={{fontSize:10,color:C.muted}}>@{u.username}</div></div>
                      <div style={{fontFamily:"Impact,sans-serif",fontSize:19,color:i===0?C.orange:C.wave}}>{dispDist(u.monthly_miles||0,du)} {du}</div>
                    </div>
                  ))}
                </div>
              </div>}
              {/* CHALLENGE LEADERBOARDS — all active */}
              {allActiveChallenges.map(ch=>{
                if(lbTab!==ch.id)return null;
                const entries=challengeLeaderboards[ch.id]||[];
                const unitLabel=ch.unit==="miles"?du:ch.unit==="km"?"km":ch.unit==="tonnage"?"lbs":ch.unit==="rucks"?"rucks":"mi";
                return <div key={ch.id}>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
                    <div style={{fontFamily:"Impact,sans-serif",fontSize:16,color:C.orange,letterSpacing:2}}>{ch.badge} {ch.title}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>{ch.desc}</div>
                    <div style={{display:"flex",gap:10,marginTop:8}}>
                      <div style={{fontSize:10,color:C.dim}}>🎯 Goal: <strong style={{color:C.white}}>{ch.goal} {ch.unit}</strong></div>
                      {ch.end&&<div style={{fontSize:10,color:new Date(ch.end)<new Date()?C.red:C.dim}}>⏰ Ends: <strong style={{color:C.white}}>{ch.end}</strong></div>}
                    </div>
                  </div>
                  <div style={{background:C.card,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
                    {!joined.includes(ch.id)&&<div style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`,background:"rgba(212,96,26,0.07)"}}>
                      <div style={{fontSize:12,color:C.muted,marginBottom:8}}>You haven't joined this challenge yet</div>
                      <button onClick={()=>(async()=>{await supabase.from("challenge_joins").upsert({user_id:session.user.id,challenge_id:ch.id},{onConflict:"user_id,challenge_id"});setJoined(p=>[...p,ch.id]);notify("✅ Joined! Check the leaderboard 🏆","success");loadChallengeLeaderboard(ch);loadChallengeProgress(ch);setLbTab(ch.id);setTimeout(()=>setTab("leaderboard"),600);})()} style={{background:`linear-gradient(135deg,${C.blue},#0e2a50)`,border:"none",borderRadius:7,padding:"8px 20px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:13,letterSpacing:2,cursor:"pointer"}}>JOIN 🎯</button>
                    </div>}
                    {entries.length===0?<div style={{padding:20,textAlign:"center",color:C.dim,fontSize:13}}>No rucks logged yet — be first!</div>:entries.map((u,i)=>{
                      const dispProg=ch.unit==="miles"?dispDist(u.prog,du):ch.unit==="km"?u.prog.toFixed(2):ch.unit==="tonnage"?dispW(u.prog,wu):u.prog.toFixed(0);
                      return(
                        <div key={u.id} onClick={()=>{setViewProf(u.id);setTab("profile");}} style={{padding:"12px 14px",background:i===0?"rgba(212,96,26,0.10)":u.id===session.user.id?"rgba(26,95,168,0.08)":"transparent",borderBottom:i<entries.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}>
                          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
                            <div style={{width:26,textAlign:"center",fontFamily:"Impact,sans-serif",fontSize:20,color:i===0?C.orange:i===1?"#b8c8d8":i===2?C.gold:C.dim}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
                            <Av emoji={u.avatar_emoji} size={34}/>
                            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:u.id===session.user.id?C.wave:C.white}}>{u.full_name||u.username}{u.id===session.user.id&&" (You)"}</div><div style={{fontSize:10,color:C.muted}}>@{u.username}</div></div>
                            <div style={{textAlign:"right"}}><div style={{fontFamily:"Impact,sans-serif",fontSize:16,color:i===0?C.orange:C.wave}}>{dispProg} {unitLabel}</div><div style={{fontSize:10,color:u.pct>=100?C.green:C.muted}}>{u.pct.toFixed(0)}% complete</div></div>
                          </div>
                          <div style={{height:5,background:C.bg,borderRadius:3,overflow:"hidden",marginLeft:38}}>
                            <div style={{height:"100%",width:u.pct+"%",background:u.pct>=100?`linear-gradient(90deg,${C.green},#2ab84a)`:`linear-gradient(90deg,${C.orange},#e08040)`,borderRadius:3,transition:"width 1s ease"}}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>;
              })}
            </div>;
          })()}

          {/* PROFILE */}
          {tab==="profile"&&<div style={{animation:"fi 0.35s ease"}}>
            {viewProf&&viewProf!==session.user.id&&<button onClick={()=>setViewProf(null)} style={{margin:"12px 20px 0",background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 14px",color:C.wave,fontSize:12,fontWeight:700,cursor:"pointer"}}>← BACK</button>}
            {profLoading?<Spinner/>:profData&&(()=>{
              const{prof,rucks,badges}=profData;
              const totalTon=rucks.reduce((s,r)=>s+(r.tonnage||0),0);
              return <div>
                <div style={{background:`linear-gradient(180deg,${C.navy},${C.bg})`,padding:"20px 20px 0"}}>
                  <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
                    <Av emoji={prof?.avatar_emoji} size={74}/>
                    <div><div style={{fontFamily:"Impact,sans-serif",fontSize:24,letterSpacing:2,color:C.white,display:"flex",alignItems:"center",gap:8}}>{prof?.full_name||prof?.username}{prof?.is_admin&&<span style={{background:C.red,borderRadius:6,padding:"2px 8px",fontSize:10,color:"#fff",letterSpacing:1}}>ADMIN</span>}</div><div style={{fontSize:12,color:C.muted}}>@{prof?.username}</div><div style={{fontSize:12,color:"#8aa8c8",marginTop:4}}>{prof?.bio}</div></div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,paddingBottom:16}}>
                    {[{l:`LIFETIME ${du.toUpperCase()}`,v:dispDist(prof?.lifetime_miles||0,du)},{l:"LIFETIME TONNAGE",v:totalTon>=1000?(totalTon/1000).toFixed(1)+"k lbs":totalTon.toFixed(0)+" lbs"},{l:"RUCKS LOGGED",v:rucks.length}].map(s=>(
                      <div key={s.l} style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:"10px 8px",textAlign:"center",border:`1px solid ${C.border}`}}>
                        <div style={{fontFamily:"Impact,sans-serif",fontSize:18,color:C.orange,lineHeight:1.1}}>{s.v}</div>
                        <div style={{fontSize:7,color:C.muted,letterSpacing:1,marginTop:3}}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{padding:"16px 20px"}}>
                  {badges.length>0&&<><div style={{fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:3,color:C.wave,marginBottom:10}}>BADGES</div><div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>{badges.map(b=>{const bd=BADGE_DEFS[b.badge_id];return bd?(<div key={b.id} style={{background:C.card,border:`1px solid ${bd.color}`,borderRadius:10,padding:"10px 12px",textAlign:"center",minWidth:78}}><div style={{fontSize:24,marginBottom:4}}>{bd.icon}</div><div style={{fontSize:9,fontWeight:700,color:bd.color,letterSpacing:1}}>{bd.label.toUpperCase()}</div></div>):null;})}</div></>}
                  {/* FITNESS PROGRESS GRAPH */}
                  <FitnessGraph rucks={rucks} du={du} wu={wu}/>

                  {/* MONTHLY / YEARLY BREAKDOWN */}
                  {rucks.length>0&&(()=>{
                    // Group rucks by year then month
                    const byYear={};
                    rucks.forEach(r=>{
                      const d=new Date(r.created_at);
                      const y=d.getFullYear();
                      const m=d.toLocaleString("default",{month:"long"});
                      const mk=`${y}-${String(d.getMonth()+1).padStart(2,"0")}`;
                      if(!byYear[y])byYear[y]={total_miles:0,total_ton:0,months:{}};
                      if(!byYear[y].months[mk])byYear[y].months[mk]={label:m,miles:0,tonnage:0,count:0};
                      byYear[y].total_miles+=(r.miles||0);
                      byYear[y].total_ton+=(r.tonnage||0);
                      byYear[y].months[mk].miles+=(r.miles||0);
                      byYear[y].months[mk].tonnage+=(r.tonnage||0);
                      byYear[y].months[mk].count+=1;
                    });
                    return Object.keys(byYear).sort((a,b)=>b-a).map(yr=>(
                      <div key={yr} style={{marginBottom:20}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                          <div style={{fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:3,color:C.wave}}>{yr}</div>
                          <div style={{fontSize:11,color:C.muted}}>{dispDist(byYear[yr].total_miles,du)} {du} · {byYear[yr].total_ton.toFixed(0)} lbs</div>
                        </div>
                        {Object.keys(byYear[yr].months).sort((a,b)=>b.localeCompare(a)).map(mk=>{
                          const mo=byYear[yr].months[mk];
                          const pct=byYear[yr].total_miles>0?(mo.miles/byYear[yr].total_miles)*100:0;
                          return(
                            <div key={mk} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:6}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                                <div><div style={{fontWeight:700,fontSize:13,color:C.white}}>{mo.label}</div><div style={{fontSize:10,color:C.dim}}>{mo.count} ruck{mo.count!==1?"s":""}</div></div>
                                <div style={{textAlign:"right"}}><div style={{fontFamily:"Impact,sans-serif",fontSize:15,color:C.orange}}>{dispDist(mo.miles,du)} {du}</div><div style={{fontSize:10,color:C.muted}}>{mo.tonnage.toFixed(0)} lbs tonnage</div></div>
                              </div>
                              <div style={{height:4,background:C.bg,borderRadius:2,overflow:"hidden"}}>
                                <div style={{height:"100%",width:pct+"%",background:`linear-gradient(90deg,${C.blue},${C.wave})`,borderRadius:2}}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ));
                  })()}
                  <div style={{fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:3,color:C.wave,marginBottom:10,marginTop:4}}>ALL RUCKS</div>
                  <div style={{fontSize:11,color:C.dim,marginBottom:12}}>Tap any ruck to expand details and photos</div>
                  {rucks.length===0?<div style={{color:C.dim,fontSize:13}}>No rucks logged yet.</div>:rucks.map(r=>(
                    <RuckDetailCard key={r.id} ruck={r} du={du} wu={wu}
                      isOwner={r.user_id===session?.user?.id||prof?.id===session?.user?.id}
                      isAdmin={isAdmin}
                      onEdit={setEditingRuck}
                      onDelete={deleteRuck}
                    />
                  ))}
                </div>
              </div>;
            })()}
          </div>}

          {/* BOTTOM NAV */}
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#030b15",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:200}}>
            {navItems.map(item=>(
              <button key={item.id} onClick={()=>{setTab(item.id);if(item.id==="profile")setViewProf(null);}} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 4px 14px",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <span style={{fontSize:item.id==="log"?22:18,filter:tab===item.id?"none":"grayscale(0.8) opacity(0.4)"}}>{item.icon}</span>
                <span style={{fontSize:8,fontWeight:700,letterSpacing:1,color:tab===item.id?C.orange:C.dim}}>{item.label}</span>
                {tab===item.id&&<div style={{width:20,height:2,background:C.orange,borderRadius:1,marginTop:1}}/>}
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
