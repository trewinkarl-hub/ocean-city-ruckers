<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#07111f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="OC Ruckers"/>
  <title>Ocean City Ruckers</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#07111f;font-family:system-ui,sans-serif}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#d4601a;border-radius:2px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    input,textarea{color-scheme:dark}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Supabase via CDN - no build step needed -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SUPABASE_URL  = "https://dvqysakwweoqehmbjhie.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2cXlzYWt3d2VvcWVobWJqaGllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTk1MzcsImV4cCI6MjA4ODM5NTUzN30.pkvpUuFkclBg2CRHf3KweEAwJp7x_zJEgi9eQOk54j8";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const C = {
      bg:"#07111f",card:"#0d1e33",border:"#1a3050",navy:"#0e2a50",
      blue:"#1a5fa8",orange:"#d4601a",white:"#f0eff0",muted:"#7a9bbf",
      dim:"#2a4060",wave:"#2878b0",gold:"#c8922a",red:"#c0281a",
    };

    const BADGE_DEFS = {
      march_50:  {label:"March Boardwalk 50",icon:"🏅",color:C.orange},
      ton_500:   {label:"500 Ton Club",      icon:"⚙️",color:C.blue},
      ton_1000:  {label:"1000 Ton Elite",    icon:"🎖️",color:C.gold},
    };

    const CHALLENGES = [
      {id:"march_50",   title:"March Boardwalk 50",desc:"Log 50 total miles.",      goal:50, unit:"miles",  badge:"🥇"},
      {id:"heavy_april",title:"Heavy April",       desc:"Log 500 lbs of tonnage.", goal:500,unit:"tonnage",badge:"⚙️"},
    ];

    const AVATARS = ["🎒","🪖","💪","🎖️","🦅","⚓","🔱","🏔️","🌊","💥"];

    function timeAgo(ts){
      const d=(Date.now()-new Date(ts).getTime())/1000;
      if(d<60)return"just now";
      if(d<3600)return Math.floor(d/60)+"m ago";
      if(d<86400)return Math.floor(d/3600)+"h ago";
      return Math.floor(d/86400)+"d ago";
    }

    function Logo({size=52}){
      return(
        <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="46" r="38" fill="#0e2a50" stroke="#1a5fa8" strokeWidth="2.5"/>
          <defs><clipPath id="lc"><circle cx="50" cy="46" r="35"/></clipPath></defs>
          <g clipPath="url(#lc)">
            <rect x="15" y="14" width="70" height="38" fill="#1a3c6e"/>
            <circle cx="63" cy="36" r="9" fill="#d4601a"/>
            <rect x="15" y="50" width="70" height="18" fill="#1a5fa8"/>
            <path d="M15 54 Q29 50 43 54 Q57 58 71 54 Q82 50 85 54" stroke="#2878b0" strokeWidth="1.5" fill="none"/>
            <rect x="26" y="22" width="9" height="30" fill="#f0eff0"/>
            <rect x="26" y="26" width="3" height="5" fill="#c0281a"/>
            <rect x="29" y="26" width="3" height="5" fill="#f0eff0"/>
            <rect x="26" y="34" width="3" height="5" fill="#c0281a"/>
            <rect x="29" y="34" width="3" height="5" fill="#f0eff0"/>
            <rect x="24" y="19" width="13" height="3" fill="#1a5fa8"/>
            <ellipse cx="72" cy="23" rx="4" ry="4" fill="#0a1828"/>
            <path d="M69 27 L66 40 L70 40 L71 33 L74 40 L78 40 L74 27Z" fill="#0a1828"/>
            <line x1="70" y1="40" x2="68" y2="48" stroke="#0a1828" strokeWidth="2.5" strokeLinecap="round"/>
            <line x1="74" y1="40" x2="76" y2="48" stroke="#0a1828" strokeWidth="2.5" strokeLinecap="round"/>
            <rect x="73" y="26" width="6" height="8" rx="1" fill="#1a5fa8"/>
          </g>
          <path d="M13 62 Q50 72 87 62 L87 84 Q50 93 13 84Z" fill="#0e2a50" stroke="#1a5fa8" strokeWidth="1.5"/>
          <text x="50" y="76" textAnchor="middle" fontFamily="Impact,sans-serif" fontSize="10" fill="#f0eff0" letterSpacing="1">OCEAN CITY RUCKERS</text>
        </svg>
      );
    }

    function Av({emoji,size=40}){
      return <div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${C.navy},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.44,border:`2px solid ${C.border}`,flexShrink:0}}>{emoji||"🎒"}</div>;
    }

    function Toast({msg,type="info",onClose}){
      useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t);},[]);
      const bg=type==="error"?"linear-gradient(135deg,#8b1010,#600a0a)":type==="success"?`linear-gradient(135deg,${C.blue},#0e3a6e)`:`linear-gradient(135deg,${C.orange},#a03a0a)`;
      return <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"12px 22px",borderRadius:8,fontWeight:700,fontSize:14,zIndex:9999,boxShadow:"0 4px 24px rgba(0,0,0,0.4)",maxWidth:"90vw",textAlign:"center"}}>{msg}</div>;
    }

    function Spinner(){
      return <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:40}}><div style={{width:32,height:32,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.orange}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>;
    }

    // ── AUTH SCREEN ──────────────────────────────────────────
    function AuthScreen({onAuth}){
      const [mode,setMode]=useState("login");
      const [form,setForm]=useState({email:"",password:"",username:"",fullName:"",avatar:"🎒"});
      const [loading,setLoading]=useState(false);
      const [err,setErr]=useState(null);

      async function submit(){
        setLoading(true);setErr(null);
        if(mode==="login"){
          const{error}=await supabase.auth.signInWithPassword({email:form.email,password:form.password});
          if(error)setErr(error.message);
          else onAuth();
        } else {
          if(!form.username.trim()){setErr("Username is required");setLoading(false);return;}
          const{error}=await supabase.auth.signUp({
            email:form.email,password:form.password,
            options:{data:{username:form.username.toLowerCase().replace(/\s/g,"_"),full_name:form.fullName||form.username,avatar_emoji:form.avatar}}
          });
          if(error)setErr(error.message);
          else setMode("verify");
        }
        setLoading(false);
      }

      if(mode==="verify"){
        return(
          <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{textAlign:"center",maxWidth:340}}>
              <div style={{fontSize:48,marginBottom:16}}>📧</div>
              <div style={{fontFamily:"Impact,sans-serif",fontSize:28,color:C.orange,letterSpacing:3,marginBottom:8}}>CHECK YOUR EMAIL</div>
              <div style={{color:C.muted,fontSize:14,lineHeight:1.6}}>We sent a confirmation to <strong style={{color:C.white}}>{form.email}</strong>. Click the link then come back and log in.</div>
              <button onClick={()=>setMode("login")} style={{marginTop:24,background:C.blue,border:"none",borderRadius:8,padding:"12px 28px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:16,letterSpacing:2,cursor:"pointer"}}>BACK TO LOGIN</button>
            </div>
          </div>
        );
      }

      return(
        <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
          <Logo size={80}/>
          <div style={{fontFamily:"Impact,sans-serif",fontSize:32,color:C.white,letterSpacing:4,marginTop:12,lineHeight:1}}>OCEAN CITY</div>
          <div style={{fontFamily:"Impact,sans-serif",fontSize:20,color:C.orange,letterSpacing:8,marginBottom:32}}>RUCKERS</div>
          <div style={{width:"100%",maxWidth:380,background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:24}}>
            <div style={{display:"flex",marginBottom:24,background:C.bg,borderRadius:8,padding:4}}>
              {["login","signup"].map(m=>(
                <button key={m} onClick={()=>setMode(m)} style={{flex:1,background:mode===m?C.blue:"none",border:"none",borderRadius:6,padding:"8px",color:mode===m?"#fff":C.muted,fontFamily:"Impact,sans-serif",fontSize:14,letterSpacing:2,cursor:"pointer"}}>
                  {m==="login"?"LOG IN":"SIGN UP"}
                </button>
              ))}
            </div>
            {err&&<div style={{background:"rgba(192,40,26,0.15)",border:"1px solid #c0281a",borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:13,color:"#ff8080"}}>{err}</div>}
            {mode==="signup"&&(
              <>
                <div style={{marginBottom:14}}>
                  <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>FULL NAME</label>
                  <input placeholder="Your name" value={form.fullName} onChange={e=>setForm(p=>({...p,fullName:e.target.value}))} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"}}/>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>USERNAME</label>
                  <input placeholder="your_handle" value={form.username} onChange={e=>setForm(p=>({...p,username:e.target.value}))} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"}}/>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:8}}>PICK YOUR AVATAR</label>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {AVATARS.map(a=>(
                      <button key={a} onClick={()=>setForm(p=>({...p,avatar:a}))} style={{fontSize:22,background:form.avatar===a?`rgba(26,95,168,0.3)`:"none",border:`2px solid ${form.avatar===a?C.blue:C.border}`,borderRadius:8,padding:6,cursor:"pointer"}}>
                        {a}
                      </button>
                    ))}
                  </div>
                </div>
              </>
            )}
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>EMAIL</label>
              <input type="email" placeholder="you@example.com" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"}}/>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>PASSWORD</label>
              <input type="password" placeholder={mode==="signup"?"Min 6 characters":"••••••••"} value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&submit()} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"}}/>
            </div>
            <button onClick={submit} disabled={loading} style={{width:"100%",background:`linear-gradient(135deg,${C.orange},#a03a0a)`,border:"none",borderRadius:8,padding:"14px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:20,letterSpacing:4,cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1}}>
              {loading?"LOADING...":(mode==="login"?"RUCK IN 🎒":"JOIN THE SQUAD 🎒")}
            </button>
          </div>
        </div>
      );
    }

    // ── MAIN APP ─────────────────────────────────────────────
    function App(){
      const [session,setSession]=useState(undefined);
      const [profile,setProfile]=useState(null);
      const [tab,setTab]=useState("feed");
      const [toast,setToast]=useState(null);
      const [viewProf,setViewProf]=useState(null);
      const [posts,setPosts]=useState([]);
      const [feedLoading,setFeedLoading]=useState(true);
      const [cmtInputs,setCmtInputs]=useState({});
      const [expandedCmts,setExpandedCmts]=useState({});
      const [logForm,setLogForm]=useState({miles:"",weight:"",caption:"",photo:null,photoFile:null});
      const [logLoading,setLogLoading]=useState(false);
      const [lbTon,setLbTon]=useState([]);
      const [lbMi,setLbMi]=useState([]);
      const [profData,setProfData]=useState(null);
      const [profLoading,setProfLoading]=useState(false);

      const notify=(msg,type="info")=>setToast({msg,type});

      useEffect(()=>{
        supabase.auth.getSession().then(({data:{session}})=>setSession(session));
        const{data:{subscription}}=supabase.auth.onAuthStateChange((_,s)=>setSession(s));
        return()=>subscription.unsubscribe();
      },[]);

      useEffect(()=>{
        if(session?.user){
          supabase.from("profiles").select("*").eq("id",session.user.id).single().then(({data})=>{if(data)setProfile(data);});
        } else setProfile(null);
      },[session]);

      const loadFeed=useCallback(async()=>{
        setFeedLoading(true);
        const{data,error}=await supabase.from("rucks").select(`*,profiles(id,username,full_name,avatar_emoji),likes(user_id),comments(id,text,user_id,created_at,profiles(username,avatar_emoji))`).order("created_at",{ascending:false}).limit(50);
        if(!error&&data)setPosts(data);
        setFeedLoading(false);
      },[]);

      useEffect(()=>{if(session)loadFeed();},[session]);

      useEffect(()=>{
        if(!session)return;
        const ch=supabase.channel("feed").on("postgres_changes",{event:"*",schema:"public",table:"rucks"},()=>loadFeed()).on("postgres_changes",{event:"*",schema:"public",table:"likes"},()=>loadFeed()).on("postgres_changes",{event:"*",schema:"public",table:"comments"},()=>loadFeed()).subscribe();
        return()=>supabase.removeChannel(ch);
      },[session]);

      async function submitRuck(){
        if(!logForm.miles||!logForm.weight){notify("⚠️ Enter miles and weight!","error");return;}
        setLogLoading(true);
        let photo_url=null;
        if(logForm.photoFile){
          const ext=logForm.photoFile.name.split(".").pop();
          const path=`${session.user.id}/${Date.now()}.${ext}`;
          const{error:upErr}=await supabase.storage.from("ruck-photos").upload(path,logForm.photoFile);
          if(!upErr){const{data:u}=supabase.storage.from("ruck-photos").getPublicUrl(path);photo_url=u.publicUrl;}
        }
        const miles=parseFloat(logForm.miles),weight=parseFloat(logForm.weight);
        const{error}=await supabase.from("rucks").insert({user_id:session.user.id,miles,weight,caption:logForm.caption||`${miles}mi @ ${weight}lbs — Tonnage: ${(miles*weight).toFixed(0)} lbs`,photo_url});
        if(error){notify("❌ Failed: "+error.message,"error");}
        else{
          await supabase.from("profiles").update({lifetime_miles:(profile?.lifetime_miles||0)+miles}).eq("id",session.user.id);
          setProfile(p=>({...p,lifetime_miles:(p?.lifetime_miles||0)+miles}));
          await checkBadges(miles);
          setLogForm({miles:"",weight:"",caption:"",photo:null,photoFile:null});
          notify(`✅ Ruck logged! ${(miles*weight).toFixed(0)} lbs tonnage earned.`,"success");
          setTab("feed");loadFeed();
        }
        setLogLoading(false);
      }

      async function checkBadges(newMiles){
        const totalMiles=(profile?.lifetime_miles||0)+newMiles;
        const{data:rd}=await supabase.from("rucks").select("tonnage").eq("user_id",session.user.id);
        const totalTon=(rd||[]).reduce((s,r)=>s+(r.tonnage||0),0);
        const{data:ex}=await supabase.from("badges").select("badge_id").eq("user_id",session.user.id);
        const has=new Set((ex||[]).map(b=>b.badge_id));
        const toAward=[];
        if(totalMiles>=50&&!has.has("march_50"))toAward.push("march_50");
        if(totalTon>=500&&!has.has("ton_500"))toAward.push("ton_500");
        if(totalTon>=1000&&!has.has("ton_1000"))toAward.push("ton_1000");
        for(const bid of toAward){
          await supabase.from("badges").insert({user_id:session.user.id,badge_id:bid});
          setTimeout(()=>notify(`🏅 Badge Unlocked: ${BADGE_DEFS[bid]?.label}!`,"success"),800);
        }
      }

      async function toggleLike(ruck){
        const liked=ruck.likes?.some(l=>l.user_id===session.user.id);
        if(liked)await supabase.from("likes").delete().eq("ruck_id",ruck.id).eq("user_id",session.user.id);
        else await supabase.from("likes").insert({ruck_id:ruck.id,user_id:session.user.id});
        setPosts(prev=>prev.map(p=>p.id===ruck.id?{...p,likes:liked?p.likes.filter(l=>l.user_id!==session.user.id):[...p.likes,{user_id:session.user.id}]}:p));
      }

      async function addComment(ruckId){
        const text=cmtInputs[ruckId]?.trim();if(!text)return;
        await supabase.from("comments").insert({ruck_id:ruckId,user_id:session.user.id,text});
        setCmtInputs(p=>({...p,[ruckId]:""}));loadFeed();
      }

      async function loadLeaderboards(){
        const[{data:ton},{data:mi}]=await Promise.all([supabase.from("leaderboard_tonnage").select("*").limit(10),supabase.from("leaderboard_monthly").select("*").limit(10)]);
        if(ton)setLbTon(ton);if(mi)setLbMi(mi);
      }

      useEffect(()=>{if(tab==="leaderboard"&&session)loadLeaderboards();},[tab,session]);

      async function loadProfile(userId){
        setProfLoading(true);
        const[{data:prof},{data:rucks},{data:bdgs}]=await Promise.all([supabase.from("profiles").select("*").eq("id",userId).single(),supabase.from("rucks").select("*").eq("user_id",userId).order("created_at",{ascending:false}),supabase.from("badges").select("*").eq("user_id",userId)]);
        setProfData({prof,rucks:rucks||[],badges:bdgs||[]});
        setProfLoading(false);
      }

      useEffect(()=>{
        if(tab==="profile"){const uid=viewProf||session?.user?.id;if(uid)loadProfile(uid);}
      },[tab,viewProf,session]);

      const myMiles=posts.filter(p=>p.user_id===session?.user?.id).reduce((s,p)=>s+(p.miles||0),0);
      const myTonnage=posts.filter(p=>p.user_id===session?.user?.id).reduce((s,p)=>s+(p.tonnage||0),0);
      const myMonthly=posts.filter(p=>p.user_id===session?.user?.id&&new Date(p.created_at).getMonth()===new Date().getMonth()).reduce((s,p)=>s+(p.miles||0),0);

      const inp={width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"};
      const navItems=[{id:"feed",icon:"📋",label:"FEED"},{id:"log",icon:"➕",label:"LOG RUCK"},{id:"challenges",icon:"🎯",label:"CHALLENGES"},{id:"leaderboard",icon:"🏆",label:"LEADERS"},{id:"profile",icon:"🎒",label:"PROFILE"}];

      if(session===undefined)return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>;
      if(!session)return <AuthScreen onAuth={()=>supabase.auth.getSession().then(({data:{session}})=>setSession(session))}/>;

      return(
        <div style={{minHeight:"100vh",background:C.bg,color:C.white,maxWidth:480,margin:"0 auto",paddingBottom:80}}>
          {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}

          {/* HEADER */}
          <div style={{background:"linear-gradient(180deg,#030b15,#07111f)",borderBottom:`1px solid ${C.border}`,padding:"12px 16px",position:"sticky",top:0,zIndex:100}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <Logo size={52}/>
              <div>
                <div style={{fontFamily:"Impact,sans-serif",fontSize:24,color:C.white,letterSpacing:4,lineHeight:1}}>OCEAN CITY</div>
                <div style={{fontFamily:"Impact,sans-serif",fontSize:15,color:C.orange,letterSpacing:8,lineHeight:1}}>RUCKERS</div>
              </div>
              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
                <Av emoji={profile?.avatar_emoji} size={34}/>
                <button onClick={()=>supabase.auth.signOut()} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",color:C.muted,fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:1}}>OUT</button>
              </div>
            </div>
          </div>

          {/* FEED */}
          {tab==="feed"&&(
            <div>
              <div style={{borderBottom:`1px solid ${C.border}`,background:`linear-gradient(160deg,${C.navy},#091828)`}}>
                <div style={{background:`linear-gradient(90deg,${C.blue},${C.navy})`,padding:"5px 16px"}}><span style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"#fff"}}>📌 PINNED — COMMAND CENTER</span></div>
                <div style={{padding:"14px 16px 12px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><Logo size={38}/><div><div style={{fontWeight:700,fontSize:14,color:C.white}}>Ocean City Ruckers</div><div style={{fontSize:11,color:C.muted}}>@ocr_official</div></div></div>
                  <p style={{fontSize:14,lineHeight:1.6,color:"#ccd8e8"}}>WELCOME TO OCEAN CITY RUCKERS. 🎒🌊 This is our digital Command Center. Post your rucks, log your weight (Miles × Weight = Tonnage), and celebrate the heavy wins. No excuses. Just miles.</p>
                </div>
              </div>
              {feedLoading?<Spinner/>:posts.length===0?<div style={{textAlign:"center",padding:40,color:C.dim}}><div style={{fontSize:40,marginBottom:12}}>🎒</div><div style={{fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:2,color:C.muted}}>NO RUCKS YET — BE FIRST!</div></div>:posts.map(post=>{
                const liked=post.likes?.some(l=>l.user_id===session.user.id);
                const ton=post.tonnage?.toFixed(0);
                return(
                  <div key={post.id} style={{borderBottom:`1px solid ${C.border}`,background:C.bg,animation:"fi 0.35s ease"}}>
                    <div style={{padding:"14px 16px 12px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                        <div onClick={()=>{setViewProf(post.user_id);setTab("profile");}} style={{cursor:"pointer"}}><Av emoji={post.profiles?.avatar_emoji} size={42}/></div>
                        <div><div style={{fontWeight:700,fontSize:15,color:C.white}}>{post.profiles?.full_name||post.profiles?.username}</div><div style={{fontSize:11,color:C.muted}}>@{post.profiles?.username} · {timeAgo(post.created_at)}</div></div>
                      </div>
                      <p style={{fontSize:14,lineHeight:1.55,color:"#ccd8e8",marginBottom:10}}>{post.caption}</p>
                      {post.photo_url&&<div style={{borderRadius:10,overflow:"hidden",marginBottom:10,height:220}}><img src={post.photo_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
                      {ton&&(
                        <div style={{display:"flex",gap:7,marginBottom:10}}>
                          {[{l:"MILES",v:post.miles,a:false},{l:"WEIGHT",v:post.weight+" lbs",a:false},{l:"TONNAGE",v:ton+" lbs",a:true}].map(s=>(
                            <div key={s.l} style={{flex:1,textAlign:"center",padding:"7px 5px",borderRadius:7,background:s.a?"rgba(212,96,26,0.12)":C.card,border:`1px solid ${s.a?C.orange:C.border}`}}>
                              <div style={{fontWeight:900,fontSize:15,color:s.a?C.orange:C.wave,lineHeight:1}}>{s.v}</div>
                              <div style={{fontSize:8,color:C.muted,letterSpacing:1,marginTop:2}}>{s.l}</div>
                            </div>
                          ))}
                        </div>
                      )}
                      <div style={{display:"flex",alignItems:"center",gap:16,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
                        <button onClick={()=>toggleLike(post)} style={{background:"none",border:"none",cursor:"pointer",color:liked?C.orange:C.dim,fontSize:13,fontWeight:700}}>🎒 {post.likes?.length||0}</button>
                        <button onClick={()=>setExpandedCmts(p=>({...p,[post.id]:!p[post.id]}))} style={{background:"none",border:"none",cursor:"pointer",color:C.dim,fontSize:13,fontWeight:600}}>💬 {post.comments?.length||0}</button>
                      </div>
                      {expandedCmts[post.id]&&(
                        <div style={{marginTop:8}}>
                          {(post.comments||[]).map(c=>(
                            <div key={c.id} style={{display:"flex",gap:6,marginBottom:5,alignItems:"flex-start"}}>
                              <Av emoji={c.profiles?.avatar_emoji} size={22}/>
                              <div><span style={{fontSize:11,fontWeight:700,color:C.wave}}>@{c.profiles?.username} </span><span style={{fontSize:12,color:"#8aa8c8"}}>{c.text}</span></div>
                            </div>
                          ))}
                          <div style={{display:"flex",gap:8,marginTop:8}}>
                            <input value={cmtInputs[post.id]||""} onChange={e=>setCmtInputs(p=>({...p,[post.id]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addComment(post.id)} placeholder="Add a comment…" style={{...inp,padding:"7px 12px",fontSize:12,borderRadius:20,flex:1}}/>
                            <button onClick={()=>addComment(post.id)} style={{background:C.blue,border:"none",borderRadius:20,padding:"7px 14px",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>POST</button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* LOG RUCK */}
          {tab==="log"&&(
            <div style={{padding:20,animation:"fi 0.35s ease"}}>
              <div style={{fontFamily:"Impact,sans-serif",fontSize:28,color:C.orange,letterSpacing:4,marginBottom:2}}>LOG A RUCK</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:20,letterSpacing:1}}>MILES × WEIGHT = TONNAGE</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                {[{k:"miles",l:"MILES",ph:"3.5",u:"mi"},{k:"weight",l:"PACK WEIGHT",ph:"30",u:"lbs"}].map(f=>(
                  <div key={f.k}>
                    <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>{f.l}</label>
                    <div style={{position:"relative"}}>
                      <input type="number" value={logForm[f.k]} onChange={e=>setLogForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} style={{...inp,fontSize:22,fontWeight:900,padding:"12px 36px 12px 12px"}}/>
                      <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:11,color:C.muted}}>{f.u}</span>
                    </div>
                  </div>
                ))}
              </div>
              {logForm.miles&&logForm.weight&&<div style={{background:"rgba(212,96,26,0.12)",border:`1px solid ${C.orange}`,borderRadius:8,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontWeight:700,color:C.orange,fontSize:13,letterSpacing:1}}>TONNAGE THIS RUCK</span><span style={{fontFamily:"Impact,sans-serif",fontSize:30,color:C.orange}}>{(parseFloat(logForm.miles||0)*parseFloat(logForm.weight||0)).toFixed(0)} lbs</span></div>}
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>CAPTION</label>
                <textarea value={logForm.caption} onChange={e=>setLogForm(p=>({...p,caption:e.target.value}))} placeholder="What was the ruck like? 💪" rows={3} style={{...inp,resize:"none"}}/>
              </div>
              <div style={{marginBottom:22}}>
                <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>PHOTO (OPTIONAL)</label>
                <label style={{display:"flex",alignItems:"center",gap:10,background:C.card,border:`2px dashed ${C.border}`,borderRadius:8,padding:"14px 16px",cursor:"pointer"}}>
                  <span style={{fontSize:22}}>📷</span>
                  <span style={{fontSize:13,color:C.muted}}>{logForm.photo?"Photo ready ✅":"Tap to upload"}</span>
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setLogForm(p=>({...p,photo:ev.target.result,photoFile:f}));r.readAsDataURL(f);}}}/>
                </label>
                {logForm.photo&&<img src={logForm.photo} alt="" style={{width:"100%",borderRadius:8,marginTop:8,maxHeight:180,objectFit:"cover"}}/>}
              </div>
              <button onClick={submitRuck} disabled={logLoading} style={{width:"100%",background:`linear-gradient(135deg,${C.orange},#a03a0a)`,border:"none",borderRadius:8,padding:"16px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:22,letterSpacing:4,cursor:logLoading?"not-allowed":"pointer",opacity:logLoading?0.7:1,boxShadow:"0 4px 20px rgba(212,96,26,0.35)"}}>
                {logLoading?"LOGGING...":"LOG IT 🎒"}
              </button>
              <div style={{marginTop:22,background:C.card,borderRadius:10,padding:"14px 16px",border:`1px solid ${C.border}`}}>
                <div style={{fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:10}}>YOUR STATS</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[{l:"LIFETIME MILES",v:(profile?.lifetime_miles||0).toFixed(1)},{l:"MONTHLY MILES",v:myMonthly.toFixed(1)},{l:"LIFETIME TONNAGE",v:myTonnage.toFixed(0)+" lbs"},{l:"TOTAL RUCKS",v:posts.filter(p=>p.user_id===session.user.id).length}].map(s=>(
                    <div key={s.l} style={{textAlign:"center",padding:"10px 8px",background:C.bg,borderRadius:7}}>
                      <div style={{fontFamily:"Impact,sans-serif",fontSize:22,color:C.orange}}>{s.v}</div>
                      <div style={{fontSize:8,color:C.muted,letterSpacing:1}}>{s.l}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* CHALLENGES */}
          {tab==="challenges"&&(
            <div style={{padding:20,animation:"fi 0.35s ease"}}>
              <div style={{fontFamily:"Impact,sans-serif",fontSize:28,color:C.orange,letterSpacing:4,marginBottom:2}}>CHALLENGES</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:20,letterSpacing:1}}>EARN DIGITAL FINISHER BADGES</div>
              {CHALLENGES.map(ch=>{
                const prog=ch.unit==="miles"?myMiles:myTonnage;
                const pct=Math.min(100,(prog/ch.goal)*100);const done=pct>=100;
                return(
                  <div key={ch.id} style={{background:done?`linear-gradient(135deg,#0a2040,#0d2c50)`:C.card,border:`1px solid ${done?C.blue:C.border}`,borderRadius:12,padding:18,marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div><div style={{fontFamily:"Impact,sans-serif",fontSize:20,color:done?C.wave:C.white,letterSpacing:2}}>{ch.title}</div><div style={{fontSize:12,color:C.muted}}>{ch.desc}</div></div>
                      <div style={{fontSize:30}}>{done?ch.badge:"🎯"}</div>
                    </div>
                    <div style={{marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1}}>PROGRESS</span><span style={{fontSize:11,fontWeight:700,color:done?C.wave:C.orange}}>{prog.toFixed(1)} / {ch.goal} {ch.unit}</span></div>
                      <div style={{height:9,background:C.bg,borderRadius:5,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:done?`linear-gradient(90deg,${C.blue},${C.wave})`:`linear-gradient(90deg,${C.orange},#e08040)`,borderRadius:5,transition:"width 1.2s ease"}}/></div>
                    </div>
                    {done?<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"rgba(26,95,168,0.18)",borderRadius:7,border:`1px solid ${C.blue}`}}><span>🏅</span><span style={{fontWeight:700,fontSize:12,color:C.wave,letterSpacing:1}}>BADGE EARNED: {ch.title.toUpperCase()} FINISHER</span></div>:<div style={{fontSize:11,color:C.dim}}>{(ch.goal-prog).toFixed(1)} {ch.unit} remaining</div>}
                  </div>
                );
              })}
            </div>
          )}

          {/* LEADERBOARD */}
          {tab==="leaderboard"&&(
            <div style={{padding:20,animation:"fi 0.35s ease"}}>
              <div style={{fontFamily:"Impact,sans-serif",fontSize:28,color:C.orange,letterSpacing:4,marginBottom:2}}>LEADERBOARD</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:20,letterSpacing:1}}>WHO'S CARRYING THE MOST IRON?</div>
              {[{title:"LIFETIME TONNAGE",data:lbTon,key:"total_tonnage",fmt:v=>(v||0).toFixed(0)+" lbs"},{title:"MONTHLY MILES",data:lbMi,key:"monthly_miles",fmt:v=>(v||0).toFixed(1)+" mi"}].map((board,bi)=>(
                <div key={bi} style={{marginBottom:28}}>
                  <div style={{fontFamily:"Impact,sans-serif",fontSize:17,letterSpacing:3,color:C.wave,marginBottom:12}}>{bi===0?"⚙️":"📍"} {board.title}</div>
                  <div style={{background:C.card,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
                    {board.data.length===0?<div style={{padding:20,textAlign:"center",color:C.dim,fontSize:13}}>No data yet — log your first ruck!</div>:board.data.map((u,i)=>(
                      <div key={u.id} onClick={()=>{setViewProf(u.id);setTab("profile");}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:i===0?"rgba(212,96,26,0.10)":u.id===session.user.id?"rgba(26,95,168,0.08)":"transparent",borderBottom:i<board.data.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}>
                        <div style={{width:26,textAlign:"center",fontFamily:"Impact,sans-serif",fontSize:20,color:i===0?C.orange:i===1?"#b8c8d8":i===2?C.gold:C.dim}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
                        <Av emoji={u.avatar_emoji} size={36}/>
                        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:u.id===session.user.id?C.wave:C.white}}>{u.full_name||u.username}{u.id===session.user.id&&" (You)"}</div><div style={{fontSize:10,color:C.muted}}>@{u.username}</div></div>
                        <div style={{fontFamily:"Impact,sans-serif",fontSize:19,color:i===0?C.orange:C.wave}}>{board.fmt(u[board.key])}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* PROFILE */}
          {tab==="profile"&&(
            <div style={{animation:"fi 0.35s ease"}}>
              {viewProf&&viewProf!==session.user.id&&<button onClick={()=>setViewProf(null)} style={{margin:"12px 20px 0",background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 14px",color:C.wave,fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:1}}>← BACK</button>}
              {profLoading?<Spinner/>:profData&&(()=>{
                const{prof,rucks,badges}=profData;
                const totalTon=rucks.reduce((s,r)=>s+(r.tonnage||0),0);
                return(
                  <div>
                    <div style={{background:`linear-gradient(180deg,${C.navy},${C.bg})`,padding:"20px 20px 0"}}>
                      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
                        <Av emoji={prof?.avatar_emoji} size={74}/>
                        <div>
                          <div style={{fontFamily:"Impact,sans-serif",fontSize:26,letterSpacing:2,color:C.white}}>{prof?.full_name||prof?.username}</div>
                          <div style={{fontSize:12,color:C.muted}}>@{prof?.username}</div>
                          <div style={{fontSize:12,color:"#8aa8c8",marginTop:4}}>{prof?.bio}</div>
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,paddingBottom:16}}>
                        {[{l:"LIFETIME MILES",v:(prof?.lifetime_miles||0).toFixed(1)},{l:"LIFETIME TONNAGE",v:totalTon.toFixed(0)},{l:"RUCKS LOGGED",v:rucks.length}].map(s=>(
                          <div key={s.l} style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:"10px 8px",textAlign:"center",border:`1px solid ${C.border}`}}>
                            <div style={{fontFamily:"Impact,sans-serif",fontSize:22,color:C.orange}}>{s.v}</div>
                            <div style={{fontSize:8,color:C.muted,letterSpacing:1}}>{s.l}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div style={{padding:"16px 20px"}}>
                      <div style={{fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:3,color:C.wave,marginBottom:10}}>MEDALS & BADGES</div>
                      {badges.length===0?<div style={{color:C.dim,fontSize:13,marginBottom:20}}>No badges yet. Hit the road. 🎒</div>:<div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>{badges.map(b=>{const bd=BADGE_DEFS[b.badge_id];return bd?(<div key={b.id} style={{background:C.card,border:`1px solid ${bd.color}`,borderRadius:10,padding:"12px 14px",textAlign:"center",minWidth:82}}><div style={{fontSize:26,marginBottom:4}}>{bd.icon}</div><div style={{fontSize:9,fontWeight:700,color:bd.color,letterSpacing:1}}>{bd.label.toUpperCase()}</div></div>):null;})}</div>}
                      <div style={{fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:3,color:C.wave,marginBottom:10}}>RUCK HISTORY</div>
                      {rucks.length===0?<div style={{color:C.dim,fontSize:13}}>No rucks logged yet.</div>:rucks.map(r=>(
                        <div key={r.id} style={{background:C.card,borderRadius:8,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${C.border}`}}>
                          <div><div style={{fontSize:11,color:C.muted}}>{new Date(r.created_at).toLocaleDateString()}</div><div style={{fontSize:13,color:"#aac0d8"}}>{r.caption?.slice(0,52)}…</div></div>
                          <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}><div style={{fontFamily:"Impact,sans-serif",fontSize:16,color:C.orange}}>{r.miles} mi</div><div style={{fontSize:10,color:C.muted}}>{r.weight} lbs</div></div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* BOTTOM NAV */}
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#030b15",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:200}}>
            {navItems.map(item=>(
              <button key={item.id} onClick={()=>{setTab(item.id);if(item.id==="profile")setViewProf(null);}} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 4px 14px",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <span style={{fontSize:item.id==="log"?22:18,filter:tab===item.id?"none":"grayscale(0.8) opacity(0.4)"}}>{item.icon}</span>
                <span style={{fontSize:8,fontWeight:700,letterSpacing:1,color:tab===item.id?C.orange:C.dim}}>{item.label}</span>
                {tab===item.id&&<div style={{width:20,height:2,background:C.orange,borderRadius:1,marginTop:1}}/>}
              </button>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
