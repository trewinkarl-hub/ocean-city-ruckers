<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Ocean City Ruckers</title>
  </head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ... (Your standard app setup)
    
    // THE FIXED FUNCTION
    const onPostEvent = async () => {
      // 1. Validation
      if(!title || !loc || !dt) {
        alert("Please fill in: Event Name, Location, and Date.");
        return;
      }

      // 2. Check Login
      if(!session?.user?.id) {
        alert("You must be logged in to post.");
        return;
      }

      try {
        const { error } = await supabase.from('events').insert([{
          user_id: session.user.id,
          title: title,
          location: loc,
          event_date: dt,
          description: dsc || '',
          image_url: img || ''
        }]);

        if(error) {
          alert("Database Error: " + error.message);
        } else {
          alert("Success! Event posted to the map.");
          setTitle(''); setLoc(''); setDt(''); setDsc(''); setImg('');
          if(typeof fetchEvents === 'function') fetchEvents();
        }
      } catch (e) {
        alert("System Error: " + e.message);
      }
    };

    // ... (The rest of your app code)
  </script>
</body>
</html>
