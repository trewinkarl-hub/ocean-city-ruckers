    function timeAgo(ts){const d=(Date.now()-new Date(ts).getTime())/1000;if(d<60)return"just now";if(d<3600)return Math.floor(d/60)+"m ago";if(d<86400)return Math.floor(d/3600)+"h ago";return Math.floor(d/86400)+"d ago";}

    // ── FITNESS PROGRESS GRAPH ───────────────────────────────
    function FitnessGraph({rucks, du, wu}) {
      const [metric, setMetric] = useState("miles");
      const [period, setPeriod] = useState("12mo");

      if (!rucks || rucks.length === 0) return null;

      // Build monthly data points
      const now = new Date();
      const months = [];
      const numMonths = period === "3mo" ? 3 : period === "6mo" ? 6 : period === "12mo" ? 12 : 24;
      for (let i = numMonths - 1; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
        const label = d.toLocaleString("default", {month:"short"});
        months.push({key, label, year: d.getFullYear(), month: d.getMonth(), miles:0, tonnage:0, rucks:0, weight:0, weightCount:0});
      }

      rucks.forEach(r => {
        const d = new Date(r.created_at);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
        const mo = months.find(m => m.key === key);
        if (!mo) return;
        mo.miles += (r.miles || 0);
        mo.tonnage += (r.tonnage || 0);
        mo.rucks += 1;
        mo.weight += (r.weight || 0);
        mo.weightCount += 1;
      });

      // Calculate values based on selected metric
      const getValue = (mo) => {
        if (metric === "miles") return du === "km" ? mo.miles * KM : mo.miles;
        if (metric === "tonnage") return wu === "kg" ? mo.tonnage * KGpLB : mo.tonnage;
        if (metric === "rucks") return mo.rucks;
        if (metric === "avgweight") return mo.weightCount > 0 ? (wu === "kg" ? (mo.weight/mo.weightCount)*KGpLB : mo.weight/mo.weightCount) : 0;
        return mo.miles;
      };

      const values = months.map(getValue);
      const maxVal = Math.max(...values, 0.1);
      const totalVal = values.reduce((s,v) => s+v, 0);
      const avgVal = totalVal / months.filter((_,i) => values[i] > 0).length || 0;
      const bestMonth = months[values.indexOf(Math.max(...values))];

      // SVG chart dimensions
      const W = 320, H = 140, PAD = {top:16, right:8, bottom:28, left:38};
      const chartW = W - PAD.left - PAD.right;
      const chartH = H - PAD.top - PAD.bottom;
      const barW = Math.max(4, (chartW / months.length) - 3);

      // Y axis labels
      const ySteps = 4;
      const yLabels = Array.from({length: ySteps+1}, (_,i) => {
        const v = (maxVal / ySteps) * i;
        if (metric === "rucks") return Math.round(v);
        if (metric === "tonnage") return v >= 1000 ? `${(v/1000).toFixed(1)}k` : Math.round(v);
        return v.toFixed(1);
      });

      // Trend line points
      const nonZero = months.map((m,i) => values[i] > 0 ? i : -1).filter(i => i >= 0);
      let trendPoints = "";
      if (nonZero.length >= 2) {
        const pts = nonZero.map(i => {
          const x = PAD.left + (i + 0.5) * (chartW / months.length);
          const y = PAD.top + chartH - (values[i] / maxVal) * chartH;
          return `${x},${y}`;
        });
        trendPoints = pts.join(" ");
      }

      const metricLabel = metric==="miles" ? du : metric==="tonnage" ? wu : metric==="rucks" ? "rucks" : wu;
      const metrics = [
        {id:"miles", label:`📍 ${du.toUpperCase()}`},
        {id:"tonnage", label:`⚙️ TONNAGE`},
        {id:"rucks", label:`🎒 RUCKS`},
        {id:"avgweight", label:`🏋️ AVG WEIGHT`},
      ];
      const periods = [{id:"3mo",l:"3M"},{id:"6mo",l:"6M"},{id:"12mo",l:"1Y"},{id:"24mo",l:"2Y"}];

      return (
        <div style={{marginBottom:24}}>
          <div style={{fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:3,color:C.wave,marginBottom:12}}>📈 FITNESS PROGRESS</div>
          {/* Metric selector */}
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {metrics.map(m => (
              <button key={m.id} onClick={()=>setMetric(m.id)} style={{background:metric===m.id?C.blue:C.card,border:`1px solid ${metric===m.id?C.blue:C.border}`,borderRadius:20,padding:"5px 12px",color:metric===m.id?"#fff":C.muted,fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:1}}>{m.label}</button>
            ))}
          </div>
          {/* Period selector */}
          <div style={{display:"flex",gap:5,marginBottom:14}}>
            {periods.map(p => (
              <button key={p.id} onClick={()=>setPeriod(p.id)} style={{background:period===p.id?C.orange:C.card,border:`1px solid ${period===p.id?C.orange:C.border}`,borderRadius:6,padding:"4px 10px",color:period===p.id?"#fff":C.muted,fontSize:10,fontWeight:700,cursor:"pointer"}}>{p.l}</button>
            ))}
          </div>
          {/* SVG Bar Chart */}
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 10px 10px",overflowX:"auto"}}>
            <svg width={Math.max(W, months.length * 22 + PAD.left + PAD.right)} height={H} style={{display:"block",minWidth:"100%"}}>
              {/* Grid lines */}
              {Array.from({length:ySteps+1},(_,i) => {
                const y = PAD.top + (chartH / ySteps) * (ySteps - i);
                return <g key={i}>
                  <line x1={PAD.left} y1={y} x2={PAD.left+chartW} y2={y} stroke={C.border} strokeWidth="0.5" strokeDasharray="3,3"/>
                  <text x={PAD.left-4} y={y+4} textAnchor="end" fontSize="8" fill={C.muted}>{yLabels[i]}</text>
                </g>;
              })}
              {/* Bars */}
              {months.map((mo, i) => {
                const val = values[i];
                const barH = val > 0 ? Math.max(2, (val / maxVal) * chartH) : 0;
                const x = PAD.left + i * (chartW / months.length) + (chartW / months.length - barW) / 2;
                const y = PAD.top + chartH - barH;
                const isCurrentMonth = mo.key === `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
                const isBest = val === maxVal && val > 0;
                const fillColor = isBest ? C.orange : isCurrentMonth ? C.blue : C.wave;
                return (
                  <g key={mo.key}>
                    {barH > 0 && <rect x={x} y={y} width={barW} height={barH} fill={fillColor} rx="2" opacity="0.85"/>}
                    {isBest && barH > 0 && <text x={x + barW/2} y={y - 3} textAnchor="middle" fontSize="7" fill={C.orange}>★</text>}
                    <text x={x + barW/2} y={H - 4} textAnchor="middle" fontSize="7" fill={mo.key.endsWith("-01") || i===0 ? C.white : C.dim}>{mo.label}</text>
                    {mo.key.endsWith("-01") && i > 0 && <text x={x} y={H-14} textAnchor="middle" fontSize="6" fill={C.muted}>{mo.year}</text>}
                  </g>
                );
              })}
              {/* Trend line */}
              {trendPoints && <polyline points={trendPoints} fill="none" stroke={C.orange} strokeWidth="1.5" strokeDasharray="4,2" opacity="0.6"/>}
            </svg>
          </div>
          {/* Summary stats row */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:10}}>
            {[
              {l:"TOTAL", v: totalVal > 0 ? (metric==="rucks" ? Math.round(totalVal) : totalVal.toFixed(1)) + " " + metricLabel : "—"},
              {l:"MONTHLY AVG", v: avgVal > 0 ? (metric==="rucks" ? Math.round(avgVal) : avgVal.toFixed(1)) + " " + metricLabel : "—"},
              {l:"BEST MONTH", v: bestMonth && values[months.indexOf(bestMonth)] > 0 ? bestMonth.label + " " + bestMonth.year : "—"},
            ].map(s => (
              <div key={s.l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px",textAlign:"center"}}>
                <div style={{fontFamily:"Impact,sans-serif",fontSize:13,color:C.orange,lineHeight:1.2}}>{s.v}</div>
                <div style={{fontSize:8,color:C.muted,letterSpacing:1,marginTop:3}}>{s.l}</div>
              </div>
            ))}
          </div>
          {/* Personal bests */}
          {(()=>{
            const allMiles = rucks.map(r => r.miles||0);
            const allTon = rucks.map(r => r.tonnage||0);
            const allWeight = rucks.map(r => r.weight||0);
            const pbs = [
              {icon:"🏅",l:"LONGEST RUCK",v: dispDist(Math.max(...allMiles,0),du)+" "+du},
              {icon:"⚙️",l:"MOST TONNAGE",v: dispW(Math.max(...allTon,0),wu)+" "+wu},
              {icon:"🏋️",l:"HEAVIEST PACK",v: dispW(Math.max(...allWeight,0),wu)+" "+wu},
            ];
            return (
              <div style={{marginTop:10}}>
                <div style={{fontSize:10,fontWeight:700,color:C.dim,letterSpacing:2,marginBottom:8}}>PERSONAL BESTS</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {pbs.map(pb => (
                    <div key={pb.l} style={{background:"rgba(212,96,26,0.08)",border:`1px solid rgba(212,96,26,0.25)`,borderRadius:8,padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:18,marginBottom:3}}>{pb.icon}</div>
                      <div style={{fontFamily:"Impact,sans-serif",fontSize:12,color:C.orange,lineHeight:1.2}}>{pb.v}</div>
                      <div style={{fontSize:7,color:C.muted,letterSpacing:1,marginTop:3}}>{pb.l}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    // ── PHOTO STRIP ──────────────────────────────────────────
    function PhotoStrip({post}){
      const [active,setActive]=useState(0);
      // Parse photos — support both new photos JSON array and legacy single photo_url
      let urls=[];
      if(post.photos){
        if(typeof post.photos==="string"){
          try{const p=JSON.parse(post.photos);if(Array.isArray(p))urls=p;else if(typeof p==="string"&&p.startsWith("http"))urls=[p];}
          catch(e){if(post.photos.startsWith("http"))urls=[post.photos];}
        } else if(Array.isArray(post.photos)){urls=post.photos;}
      }
      if(urls.length===0&&post.photo_url&&post.photo_url.startsWith("http"))urls=[post.photo_url];
      if(urls.length===0)return null;
      if(urls.length===1)return(
        <div style={{borderRadius:10,overflow:"hidden",marginBottom:10,maxHeight:280,cursor:"pointer"}} onClick={()=>window.open(urls[0],"_blank")}>
          <img src={urls[0]} alt="" style={{width:"100%",maxHeight:280,objectFit:"cover",display:"block"}}/>
        </div>
      );
      return(
        <div style={{marginBottom:10}}>
          {/* Main image */}
          <div style={{borderRadius:10,overflow:"hidden",marginBottom:6,position:"relative",maxHeight:280,cursor:"pointer"}} onClick={()=>window.open(urls[active],"_blank")}>
            <img src={urls[active]} alt="" style={{width:"100%",maxHeight:280,objectFit:"cover",display:"block"}}/>
            <div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,0.6)",borderRadius:20,padding:"3px 10px",fontSize:10,color:"#fff",fontWeight:700}}>{active+1} / {urls.length}</div>
          </div>
          {/* Thumbnail strip */}
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
            {urls.map((u,i)=>(
              <img key={i} src={u} alt="" onClick={()=>setActive(i)} style={{width:60,height:48,objectFit:"cover",borderRadius:6,flexShrink:0,cursor:"pointer",border:`2px solid ${i===active?C.orange:C.border}`,opacity:i===active?1:0.6,transition:"all 0.2s"}}/>
            ))}
          </div>
        </div>
      );
    }

      );

          <button onClick={()=>{if(!f.title||!f.date)return;onSave({...f,id:`ev_${Date.now()}`,rsvps:{yes:[],no:[],maybe:[]},active:true});}} style={{width:"100%",background:"linear-gradient(135deg,#1a8a3a,#0d5a28)",border:"none",borderRadius:8,padding:"14px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:3,cursor:"pointer"}}>POST EVENT 📅</button>
        </div>

    // ── SUGGEST EVENT MODAL (MEMBER) ─────────────────────────
    function SuggestEventModal({onClose,onSuggest}){
      const [f,setF]=useState({title:"",desc:"",location:"",date:"",time:""});
      const inp={width:"100%",background:"#07111f",border:"1px solid #1a3050",borderRadius:8,padding:"11px 12px",color:"#f0eff0",fontSize:14,outline:"none"};
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#0d1e33",border:"1px solid #1a3050",borderRadius:"16px 16px 0 0",padding:22,width:"100%",maxWidth:480,maxHeight:"88vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontFamily:"Impact,sans-serif",fontSize:20,color:"#d4601a",letterSpacing:3}}>SUGGEST AN EVENT</div>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#7a9bbf",fontSize:22,cursor:"pointer"}}>✕</button>
          </div>
          <div style={{background:"rgba(26,95,168,0.12)",border:"1px solid #1a5fa8",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:12,color:"#8aa8c8"}}>💡 Your suggestion goes to an admin for approval before it's posted to the feed.</div>
          <div style={{marginBottom:10}}><label style={{display:"block",fontWeight:700,fontSize:10,color:"#2878b0",letterSpacing:2,marginBottom:5}}>EVENT NAME</label><input value={f.title} onChange={e=>setF(p=>({...p,title:e.target.value}))} placeholder="e.g. Saturday Morning Ruck" style={inp}/></div>
          <div style={{marginBottom:10}}><label style={{display:"block",fontWeight:700,fontSize:10,color:"#2878b0",letterSpacing:2,marginBottom:5}}>DESCRIPTION</label><textarea value={f.desc} onChange={e=>setF(p=>({...p,desc:e.target.value}))} placeholder="What are you thinking?" rows={2} style={{...inp,resize:"none"}}/></div>
          <div style={{marginBottom:10}}><label style={{display:"block",fontWeight:700,fontSize:10,color:"#2878b0",letterSpacing:2,marginBottom:5}}>LOCATION</label><input value={f.location} onChange={e=>setF(p=>({...p,location:e.target.value}))} placeholder="Where would you meet?" style={inp}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            <div><label style={{display:"block",fontWeight:700,fontSize:10,color:"#2878b0",letterSpacing:2,marginBottom:5}}>DATE</label><input type="date" value={f.date} onChange={e=>setF(p=>({...p,date:e.target.value}))} style={inp}/></div>
            <div><label style={{display:"block",fontWeight:700,fontSize:10,color:"#2878b0",letterSpacing:2,marginBottom:5}}>TIME</label><input type="time" value={f.time} onChange={e=>setF(p=>({...p,time:e.target.value}))} style={inp}/></div>
          </div>
          <button onClick={()=>{if(!f.title)return;onSuggest(f);}} style={{width:"100%",background:"linear-gradient(135deg,#1a5fa8,#0e2a50)",border:"none",borderRadius:8,padding:"14px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:3,cursor:"pointer"}}>SEND SUGGESTION 💡</button>
        </div>
      </div>;
    }

    // ── AUTH SCREEN ───────────────────────────────────────────
    function AuthScreen({onAuth}){
      const [mode,setMode]=useState(()=>window.location.search.includes("invite=RUCK2025")?"signup":"login");
      const [form,setForm]=useState({email:"",password:"",username:"",fullName:"",avatar:"🎒",inviteCode:window.location.search.includes("invite=RUCK2025")?"RUCK2025":""});
      const [loading,setLoading]=useState(false);
      const [err,setErr]=useState(null);

      async function submit(){
        setLoading(true);setErr(null);
        if(mode==="login"){
          const{error}=await supabase.auth.signInWithPassword({email:form.email,password:form.password});
          if(error)setErr(error.message);else onAuth();
        } else {
          if(!form.username.trim()){setErr("Username required");setLoading(false);return;}
          if(form.inviteCode.trim().toUpperCase()!==INVITE_CODE){setErr("Invalid invite code. Ask an admin for the link.");setLoading(false);return;}
          const{error}=await supabase.auth.signUp({email:form.email,password:form.password,options:{data:{username:form.username.toLowerCase().replace(/\s/g,"_"),full_name:form.fullName||form.username,avatar_emoji:form.avatar}}});
          if(error)setErr(error.message);else setMode("verify");
        }
        setLoading(false);
      }

      if(mode==="verify")return(
        <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{textAlign:"center",maxWidth:340}}>
            <div style={{fontSize:48,marginBottom:16}}>📧</div>
            <div style={{fontFamily:"Impact,sans-serif",fontSize:26,color:C.orange,letterSpacing:3,marginBottom:8}}>CHECK YOUR EMAIL</div>
            <div style={{color:C.muted,fontSize:14,lineHeight:1.6}}>Confirmation sent to <strong style={{color:C.white}}>{form.email}</strong>. Click the link then log in.</div>
            <button onClick={()=>setMode("login")} style={{marginTop:24,background:C.blue,border:"none",borderRadius:8,padding:"12px 28px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:16,letterSpacing:2,cursor:"pointer"}}>BACK TO LOGIN</button>
          </div>
        </div>
      );

      return(
        <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
          <Logo size={100}/>
          <div style={{fontFamily:"Impact,sans-serif",fontSize:32,color:C.white,letterSpacing:4,marginTop:10,lineHeight:1}}>OCEAN CITY</div>
          <div style={{fontFamily:"Impact,sans-serif",fontSize:20,color:C.orange,letterSpacing:8,marginBottom:28}}>RUCKERS</div>
          <div style={{width:"100%",maxWidth:380,background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:24}}>
            <div style={{display:"flex",marginBottom:20,background:C.bg,borderRadius:8,padding:4}}>
              {["login","signup"].map(m=><button key={m} onClick={()=>setMode(m)} style={{flex:1,background:mode===m?C.blue:"none",border:"none",borderRadius:6,padding:"8px",color:mode===m?"#fff":C.muted,fontFamily:"Impact,sans-serif",fontSize:14,letterSpacing:2,cursor:"pointer"}}>{m==="login"?"LOG IN":"SIGN UP"}</button>)}
            </div>
            {err&&<div style={{background:"rgba(192,40,26,0.15)",border:"1px solid #c0281a",borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:13,color:"#ff8080"}}>{err}</div>}
            {mode==="signup"&&<>
              <div style={{marginBottom:10}}><label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>FULL NAME</label><input placeholder="Your name" value={form.fullName} onChange={e=>setForm(p=>({...p,fullName:e.target.value}))} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"}}/></div>
              <div style={{marginBottom:10}}><label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>USERNAME</label><input placeholder="your_handle" value={form.username} onChange={e=>setForm(p=>({...p,username:e.target.value}))} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"}}/></div>
              <div style={{marginBottom:10}}><label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>INVITE CODE</label><input placeholder="Ask admin for code" value={form.inviteCode} onChange={e=>setForm(p=>({...p,inviteCode:e.target.value}))} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"}}/></div>
              <div style={{marginBottom:14}}><label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:8}}>AVATAR</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{AVATARS.map(a=><button key={a} onClick={()=>setForm(p=>({...p,avatar:a}))} style={{fontSize:22,background:form.avatar===a?"rgba(26,95,168,0.3)":"none",border:`2px solid ${form.avatar===a?C.blue:C.border}`,borderRadius:8,padding:6,cursor:"pointer"}}>{a}</button>)}</div></div>
            </>}
            <div style={{marginBottom:10}}><label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>EMAIL</label><input type="email" placeholder="you@example.com" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"}}/></div>
            <div style={{marginBottom:16}}><label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>PASSWORD</label><input type="password" placeholder={mode==="signup"?"Min 6 characters":"••••••••"} value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&submit()} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"}}/></div>
            <button onClick={submit} disabled={loading} style={{width:"100%",background:`linear-gradient(135deg,${C.orange},#a03a0a)`,border:"none",borderRadius:8,padding:"14px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:20,letterSpacing:4,cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1}}>
              {loading?"LOADING...":(mode==="login"?"RUCK IN 🎒":"JOIN THE SQUAD 🎒")}
            </button>
          </div>
        </div>
      );
    }

    // ── ADMIN PANEL ───────────────────────────────────────────
    function AdminPanel({session,profile,notify,onChallengeCreate,challenges,onChallengeDelete,onClose,pendingEvents,activeEvents,approveEvent,rejectEvent,markEventDone,deleteEvent,onCreateEvent}){
      const [view,setView]=useState("home");
      const [members,setMembers]=useState([]);
      const [pending,setPending]=useState([]);
      const [loadingM,setLoadingM]=useState(false);
      const [announcement,setAnnouncement]=useState("");
      const [savedAnn,setSavedAnn]=useState(localStorage.getItem("ocr_announcement")||"WELCOME TO OCEAN CITY RUCKERS. 🎒🌊 Log your rucks, track your tonnage, join challenges, and compete on the leaderboard. No excuses. Just miles.");
      const [showChModal,setShowChModal]=useState(false);
      const inviteUrl = window.location.origin + window.location.pathname + "?invite=RUCK2025";

      async function loadMembers(){
        setLoadingM(true);
        const{data}=await supabase.from("profiles").select("*").order("created_at",{ascending:false});
        if(data)setMembers(data);
        setLoadingM(false);
      }

      useEffect(()=>{if(view==="members")loadMembers();},[view]);

      async function deleteUser(userId,username){
        if(!confirm(`Delete @${username}? This cannot be undone.`))return;
        await supabase.from("rucks").delete().eq("user_id",userId);
        await supabase.from("likes").delete().eq("user_id",userId);
        await supabase.from("comments").delete().eq("user_id",userId);
        await supabase.from("badges").delete().eq("user_id",userId);
        await supabase.from("profiles").delete().eq("id",userId);
        notify(`✅ @${username} deleted`,"success");
        loadMembers();
      }

      async function promoteAdmin(userId,username){
        await supabase.from("profiles").update({is_admin:true}).eq("id",userId);
        notify(`✅ @${username} is now an admin`,"success");
        loadMembers();
      }

      function saveAnnouncement(){
        localStorage.setItem("ocr_announcement",announcement||savedAnn);
        setSavedAnn(announcement||savedAnn);
        notify("✅ Announcement updated!","success");
        setAnnouncement("");
      }

      function copyInvite(){
        navigator.clipboard.writeText(inviteUrl).then(()=>notify("✅ Invite link copied!","success")).catch(()=>notify("Link: "+inviteUrl));
      }

      return(
        <div style={{position:"fixed",inset:0,background:C.bg,zIndex:600,overflowY:"auto",maxWidth:480,margin:"0 auto"}}>
          <div style={{background:"linear-gradient(135deg,#3a0a0a,#600a0a)",padding:"14px 16px",position:"sticky",top:0,zIndex:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Logo size={38}/>
              <div>
                <div style={{fontFamily:"Impact,sans-serif",fontSize:18,color:"#fff",letterSpacing:3}}>ADMIN PANEL</div>
                <div style={{fontSize:10,color:"#ff9999",letterSpacing:1}}>🔐 RESTRICTED ACCESS</div>
              </div>
              <button onClick={onClose} style={{marginLeft:"auto",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>← BACK</button>
            </div>
          </div>

          {showChModal&&<ChallengeModal onClose={()=>setShowChModal(false)} onSave={f=>{onChallengeCreate(f);setShowChModal(false);}}/>}

          <div style={{padding:16}}>
            {/* NAV PILLS */}
            <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
              {[{id:"home",icon:"🏠",l:"HOME"},{id:"challenges",icon:"🎯",l:"CHALLENGES"},{id:"events",icon:"📅",l:"EVENTS"},{id:"members",icon:"👥",l:"MEMBERS"},{id:"invite",icon:"🔗",l:"INVITE"},{id:"announce",icon:"📢",l:"ANNOUNCE"}].map(v=>(
                <button key={v.id} onClick={()=>setView(v.id)} style={{flex:1,minWidth:60,background:view===v.id?C.red:C.card,border:`1px solid ${view===v.id?C.red:C.border}`,borderRadius:8,padding:"8px 4px",color:view===v.id?"#fff":C.muted,fontSize:10,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                  <div style={{fontSize:16,marginBottom:2}}>{v.icon}</div>{v.l}
                </button>
              ))}
            </div>

            {/* HOME */}
            {view==="home"&&<div>
              <div style={{fontFamily:"Impact,sans-serif",fontSize:22,color:C.orange,letterSpacing:3,marginBottom:16}}>ADMIN OVERVIEW</div>
              {[{icon:"🎯",label:"Manage Challenges",desc:"Create, edit or delete challenges",action:()=>setView("challenges")},{icon:"📅",label:"Manage Events",desc:"Approve suggestions, create or end events",action:()=>setView("events")},{icon:"👥",label:"Manage Members",desc:"View, delete or promote members",action:()=>setView("members")},{icon:"🔗",label:"Invite Link",desc:"Share the join link with new members",action:()=>setView("invite")},{icon:"📢",label:"Announcement",desc:"Edit the pinned welcome message",action:()=>setView("announce")}].map(item=>(
                <button key={item.label} onClick={item.action} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left"}}>
                  <span style={{fontSize:26}}>{item.icon}</span>
                  <div><div style={{fontWeight:700,color:C.white,fontSize:14}}>{item.label}</div><div style={{fontSize:12,color:C.muted}}>{item.desc}</div></div>
                  <span style={{marginLeft:"auto",color:C.dim,fontSize:18}}>›</span>
                </button>
              ))}
            </div>}

            {/* CHALLENGES */}
            {view==="challenges"&&<div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{fontFamily:"Impact,sans-serif",fontSize:20,color:C.orange,letterSpacing:3}}>CHALLENGES</div>
                <button onClick={()=>setShowChModal(true)} style={{background:"linear-gradient(135deg,#1a8a3a,#0d5a28)",border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ NEW</button>
              </div>
              {challenges.length===0?<div style={{color:C.dim,textAlign:"center",padding:20}}>No challenges yet</div>:challenges.map(ch=>(
                <div key={ch.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div><div style={{fontWeight:700,color:C.white,fontSize:14}}>{ch.badge} {ch.title}</div><div style={{fontSize:12,color:C.muted,marginTop:3}}>{ch.desc}</div><div style={{fontSize:11,color:C.dim,marginTop:3}}>Goal: {ch.goal} {ch.unit}{ch.start?` · ${ch.start} → ${ch.end||"ongoing"}`:""}</div></div>
                    <button onClick={()=>{if(confirm(`Delete "${ch.title}"?`))onChallengeDelete(ch.id);}} style={{background:"rgba(192,40,26,0.15)",border:"1px solid #c0281a",borderRadius:6,padding:"4px 10px",color:"#ff8080",fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0,marginLeft:8}}>DELETE</button>
                  </div>
                </div>
              ))}
            </div>}

            {/* MEMBERS */}
            {view==="events"&&<div>
              <div style={{fontFamily:"Impact,sans-serif",fontSize:18,color:C.orange,letterSpacing:3,marginBottom:12}}>📅 RUCK EVENTS</div>
              {/* Pending suggestions */}
              {pendingEvents&&pendingEvents.length>0&&<div style={{marginBottom:16}}>
                <div style={{fontWeight:700,fontSize:11,color:"#c8922a",letterSpacing:2,marginBottom:8}}>⏳ PENDING APPROVAL ({pendingEvents.length})</div>
                {pendingEvents.map(ev=>(
                  <div key={ev.id} style={{background:"rgba(200,146,42,0.08)",border:"1px solid rgba(200,146,42,0.3)",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#f0eff0",marginBottom:2}}>{ev.title}</div>
                    <div style={{fontSize:11,color:"#7a9bbf",marginBottom:2}}>Suggested by {ev.suggestedByName} · {ev.date} {ev.time}</div>
                    {ev.location&&<div style={{fontSize:11,color:"#7a9bbf",marginBottom:6}}>📍 {ev.location}</div>}
                    {ev.desc&&<div style={{fontSize:12,color:"#8aa8c8",marginBottom:8}}>{ev.desc}</div>}
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>approveEvent(ev)} style={{flex:1,background:"linear-gradient(135deg,#1a8a3a,#0d5a28)",border:"none",borderRadius:6,padding:"8px",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>✅ APPROVE</button>
                      <button onClick={()=>rejectEvent(ev.id)} style={{flex:1,background:"rgba(192,40,26,0.15)",border:"1px solid rgba(192,40,26,0.4)",borderRadius:6,padding:"8px",color:"#c0281a",fontWeight:700,fontSize:12,cursor:"pointer"}}>🗑️ REJECT</button>
                    </div>
                  </div>
                ))}
              </div>}
              {/* Active events */}
              <div style={{fontWeight:700,fontSize:11,color:C.wave,letterSpacing:2,marginBottom:8}}>ACTIVE EVENTS</div>
              {(!activeEvents||activeEvents.length===0)?<div style={{color:C.dim,fontSize:12,marginBottom:12}}>No active events</div>:activeEvents.map(ev=>(
                <div key={ev.id} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#f0eff0"}}>{ev.badge} {ev.title}</div>
                  <div style={{fontSize:11,color:"#7a9bbf",marginBottom:6}}>{ev.date} {ev.time} {ev.location&&`· 📍 ${ev.location}`}</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>markEventDone(ev.id)} style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px",color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>✅ MARK DONE</button>
                    <button onClick={()=>deleteEvent(ev.id)} style={{flex:1,background:"rgba(192,40,26,0.1)",border:"1px solid rgba(192,40,26,0.4)",borderRadius:6,padding:"7px",color:"#c0281a",fontWeight:700,fontSize:11,cursor:"pointer"}}>🗑️ DELETE</button>
                  </div>
                </div>
              {/* This replaces the old CREATE NEW EVENT button */}
              <button 
                onClick={async () => {
                  const title = prompt("Event Name:");
                  const loc = prompt("Location (e.g. Plymouth Hoe):");
                  const date = prompt("Date/Time (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
                  
                  if (!title || !loc || !date) {
                    alert("All fields are required to post an event.");
                    return;
                  }

                  const { error } = await supabase.from('events').insert([{
                    user_id: session.user.id,
                    title: title,
                    location: loc,
                    event_date: date,
                    status: 'active'
                  }]);

                  if (error) {
                    alert("Database Error: " + error.message);
                  } else {
                    alert("✅ Event successfully created!");
                    // This reloads the page to show the new event
                    window.location.reload(); 
                  }
                }} 
                style={{width:"100%",background:"linear-gradient(135deg,#1a8a3a,#0d5a28)",border:"none",borderRadius:8,padding:"12px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:16,letterSpacing:2,cursor:"pointer",marginTop:8}}
              >
                + CREATE NEW EVENT
              </button>
            </div>}

            {view==="members"&&<div>
              <div style={{fontFamily:"Impact,sans-serif",fontSize:20,color:C.orange,letterSpacing:3,marginBottom:16}}>MEMBERS ({members.length})</div>
              {loadingM?<Spinner/>:members.map(m=>(
                <div key={m.id} style={{background:C.card,border:`1px solid ${m.is_admin?C.red:C.border}`,borderRadius:10,padding:12,marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
                  <Av emoji={m.avatar_emoji} size={40}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,color:C.white,fontSize:13,display:"flex",alignItems:"center",gap:6}}>{m.full_name||m.username}{m.is_admin&&<span style={{background:C.red,borderRadius:4,padding:"1px 6px",fontSize:9,color:"#fff",letterSpacing:1}}>ADMIN</span>}</div>
                    <div style={{fontSize:11,color:C.muted}}>@{m.username}</div>

    // ── MAIN APP ──────────────────────────────────────────────
    function App(){
      const [session,setSession]=useState(undefined);
      const [profile,setProfile]=useState(null);
      const [tab,setTab]=useState("feed");
      const [toast,setToast]=useState(null);
      const [viewProf,setViewProf]=useState(null);
      const [posts,setPosts]=useState([]);
      const [feedLoading,setFeedLoading]=useState(true);
      const [cmtInputs,setCmtInputs]=useState({});
      const [expandedCmts,setExpandedCmts]=useState({});
      const [logForm,setLogForm]=useState({miles:"",weight:"",caption:"",photos:[],photoFiles:[],linkedId:null,linkedType:null,ruckDate:new Date().toLocaleDateString("en-CA")});
      const [logLoading,setLogLoading]=useState(false);
      const [lbTon,setLbTon]=useState([]);
      const [lbMi,setLbMi]=useState([]);
      const [profData,setProfData]=useState(null);
      const [profLoading,setProfLoading]=useState(false);
      const [showImport,setShowImport]=useState(false);
      const [editingRuck,setEditingRuck]=useState(null); // {id, miles, weight, caption}
      const [showAdmin,setShowAdmin]=useState(false);
      const [du,setDu]=useState("mi");
      const [wu,setWu]=useState("lbs");
      const [challenges,setChallenges]=useState([
        {id:"march_50_2026",title:"March Boardwalk 50",desc:"Log 50 total miles this month.",goal:50,unit:"miles",badge:"🥇",start:"2026-03-01",end:"2026-03-31"},
        {id:"spring_tonnage_2026",title:"Spring Tonnage Grind",desc:"Log 1000 lbs of total tonnage this spring.",goal:1000,unit:"tonnage",badge:"⚙️",start:"2026-03-01",end:"2026-05-31"},
      ]);
      const [events,setEvents]=useState([]); // ruck events
      const [joined,setJoined]=useState([]); // joined challenge ids
      const [eventRsvps,setEventRsvps]=useState({}); // {eventId: "yes"|"no"|"maybe"}
      const [pendingEvents,setPendingEvents]=useState([]); // member-suggested events awaiting admin approval
      const [challengeProgress,setChallengeProgress]=useState({});
      const [progLoading,setProgLoading]=useState({});
      const [challengeLeaderboards,setChallengeLeaderboards]=useState({});
      const [lbTab,setLbTab]=useState("tonnage");
      const [showEventModal,setShowEventModal]=useState(false);
      const [suggestEventModal,setSuggestEventModal]=useState(false);
      const announcement = localStorage.getItem("ocr_announcement")||"WELCOME TO OCEAN CITY RUCKERS. 🎒🌊 Log your rucks, track your tonnage, join challenges, and compete on the leaderboard. No excuses. Just miles.";

      const notify=(msg,type="info")=>setToast({msg,type});
      const [notifications,setNotifications]=useState([]);
      const [showNotifs,setShowNotifs]=useState(false);
      const [unreadCount,setUnreadCount]=useState(0);

      function addNotif(msg,icon="🎒"){
        const n={id:Date.now(),msg,icon,ts:new Date().toISOString(),read:false};
        setNotifications(p=>{const updated=[n,...p].slice(0,50);return updated;});
        setUnreadCount(p=>p+1);
        // Push notification if permission granted
        if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
          new Notification("Ocean City Ruckers",{body:msg,icon:"/favicon.ico"});
        }
      }

      async function requestPushPermission(){
        if(typeof Notification==="undefined"){notify("Push notifications not supported on this device","error");return;}
        if(Notification.permission==="granted"){notify("✅ Push notifications already enabled!","success");return;}
        const perm=await Notification.requestPermission();
        if(perm==="granted"){notify("✅ Push notifications enabled!","success");addNotif("Welcome to Ocean City Ruckers notifications! 🎒","🔔");}
        else notify("Notifications blocked — enable them in your browser settings","error");
      }

      const isAdmin = profile?.is_admin || session?.user?.email===MASTER_ADMIN;

      useEffect(()=>{
        supabase.auth.getSession().then(({data:{session}})=>setSession(session));
        const{data:{subscription}}=supabase.auth.onAuthStateChange((_,s)=>setSession(s));
        return()=>subscription.unsubscribe();
      },[]);

      useEffect(()=>{
        if(session?.user){
          supabase.from("profiles").select("*").eq("id",session.user.id).single().then(({data})=>{
            if(data)setProfile(data);
            // Auto-set master admin
            if(session.user.email===MASTER_ADMIN&&!data?.is_admin){
              supabase.from("profiles").update({is_admin:true}).eq("id",session.user.id);
            }
          });
        } else setProfile(null);
      },[session]);

      const loadFeed=useCallback(async()=>{
        setFeedLoading(true);
        const{data,error}=await supabase.from("rucks").select(`*,profiles(id,username,full_name,avatar_emoji),likes(user_id),comments(id,text,user_id,created_at,profiles(username,avatar_emoji))`).order("created_at",{ascending:false}).limit(50);
        if(!error&&data)setPosts(data);
        setFeedLoading(false);
      },[]);

      useEffect(()=>{if(session)loadFeed();},[session]);

      useEffect(()=>{
        if(!session)return;
        const ch=supabase.channel("feed")
          .on("postgres_changes",{event:"INSERT",schema:"public",table:"rucks"},payload=>{
            loadFeed();
            if(payload.new?.user_id!==session?.user?.id){
              supabase.from("profiles").select("full_name,username").eq("id",payload.new.user_id).single().then(({data})=>{
                if(data)addNotif(`${data.full_name||data.username} just logged a ruck! 🎒`,"🎒");
              });
            }
          })
          .on("postgres_changes",{event:"INSERT",schema:"public",table:"likes"},payload=>{
            loadFeed();
            if(payload.new?.user_id!==session?.user?.id){
              supabase.from("rucks").select("user_id,miles").eq("id",payload.new.ruck_id).single().then(({data})=>{
                if(data?.user_id===session?.user?.id)addNotif("Someone liked your ruck! 🎒","❤️");
              });
            }
          })
          .on("postgres_changes",{event:"INSERT",schema:"public",table:"comments"},payload=>{
            loadFeed();
            if(payload.new?.user_id!==session?.user?.id){
              supabase.from("rucks").select("user_id").eq("id",payload.new.ruck_id).single().then(({data})=>{
                if(data?.user_id===session?.user?.id)addNotif(`New comment on your ruck: "${(payload.new.text||"").slice(0,40)}"...`,"💬");
              });
            }
          })
          .subscribe();
        return()=>supabase.removeChannel(ch);
      },[session]);

      async function submitRuck(overMiles,overWeight,overCaption){
        const miles=overMiles!==undefined?overMiles:toMiles(logForm.miles,du);
        const weight=overWeight!==undefined?overWeight:toLbs(logForm.weight,wu);
        const caption=overCaption||logForm.caption||`${logForm.miles}${du} @ ${logForm.weight}${wu} — Tonnage: ${(miles*weight).toFixed(0)} lbs`;
        if(!miles||!weight){notify("⚠️ Enter distance and weight!","error");return;}
        setLogLoading(true);
        // Upload all photos and collect URLs
        const photo_urls=[];
        if(logForm.photoFiles&&logForm.photoFiles.length>0){
          for(const file of logForm.photoFiles){
            try{
              // Sanitise filename — remove spaces and special chars
              const ext=(file.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,"");
              const safeName=`${session.user.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
              const{data:upData,error:upErr}=await supabase.storage.from("ruck-photos").upload(safeName,file,{cacheControl:"3600",upsert:false});
              if(upErr){
                console.error("Photo upload error:",upErr);
                notify(`⚠️ Photo upload failed: ${upErr.message}`,"error");
              } else {
                const{data:urlData}=supabase.storage.from("ruck-photos").getPublicUrl(safeName);
                if(urlData?.publicUrl)photo_urls.push(urlData.publicUrl);
              }
            }catch(e){console.error("Upload exception:",e);notify("⚠️ Photo upload error — check storage bucket","error");}
          }
        }
        const photo_url=photo_urls.length>0?photo_urls[0]:null;
        const photos_json=photo_urls.length>0?JSON.stringify(photo_urls):null;
        // Use selected date with current time
        const ruckTs=logForm.ruckDate?`${logForm.ruckDate}T${new Date().toTimeString().slice(0,8)}`:new Date().toISOString();
        const{error}=await supabase.from("rucks").insert({user_id:session.user.id,miles,weight,caption,photo_url,photos:photos_json,linked_id:logForm.linkedId||null,linked_type:logForm.linkedType||null,created_at:ruckTs});
        if(error){notify("❌ Failed: "+error.message,"error");}
        else{
          await supabase.from("profiles").update({lifetime_miles:(profile?.lifetime_miles||0)+miles}).eq("id",session.user.id);
          setProfile(p=>({...p,lifetime_miles:(p?.lifetime_miles||0)+miles}));
          await checkBadges(miles);
          setLogForm({miles:"",weight:"",caption:"",photos:[],photoFiles:[],linkedId:null,linkedType:null,ruckDate:new Date().toLocaleDateString("en-CA")});
          notify(`✅ Ruck logged! ${(miles*weight).toFixed(0)} lbs tonnage!`,"success");
          addNotif(`You logged a ruck — ${dispDist(miles,du)} ${du} @ ${dispW(weight,wu)} ${wu}. Tonnage: ${(miles*weight).toFixed(0)} lbs 💪`,"🎒");
          setTab("feed");loadFeed();
          // Refresh challenge progress after logging
          challenges.forEach(ch=>loadChallengeProgress(ch));
        }
        setLogLoading(false);
      }

      async function checkBadges(newMiles){
        const totalMiles=(profile?.lifetime_miles||0)+newMiles;
        const{data:rd}=await supabase.from("rucks").select("tonnage").eq("user_id",session.user.id);
        const totalTon=(rd||[]).reduce((s,r)=>s+(r.tonnage||0),0);
        const{data:ex}=await supabase.from("badges").select("badge_id").eq("user_id",session.user.id);
        const has=new Set((ex||[]).map(b=>b.badge_id));
        const toAward=[];
        if(totalMiles>=50&&!has.has("march_50"))toAward.push("march_50");
        if(totalTon>=500&&!has.has("ton_500"))toAward.push("ton_500");
        if(totalTon>=1000&&!has.has("ton_1000"))toAward.push("ton_1000");
        for(const bid of toAward){
          await supabase.from("badges").insert({user_id:session.user.id,badge_id:bid});
          setTimeout(()=>{notify(`🏅 Badge Unlocked: ${BADGE_DEFS[bid]?.label}!`,"success");addNotif(`Badge Unlocked: ${BADGE_DEFS[bid]?.label}! 🏅`,"🏅");},800);
        }
      }

      async function toggleLike(ruck){
        const liked=ruck.likes?.some(l=>l.user_id===session.user.id);
        if(liked)await supabase.from("likes").delete().eq("ruck_id",ruck.id).eq("user_id",session.user.id);
        else await supabase.from("likes").insert({ruck_id:ruck.id,user_id:session.user.id});
        setPosts(prev=>prev.map(p=>p.id===ruck.id?{...p,likes:liked?p.likes.filter(l=>l.user_id!==session.user.id):[...p.likes,{user_id:session.user.id}]}:p));
      }

      async function addComment(ruckId){
        const text=cmtInputs[ruckId]?.trim();if(!text)return;
        await supabase.from("comments").insert({ruck_id:ruckId,user_id:session.user.id,text});
        setCmtInputs(p=>({...p,[ruckId]:""}));loadFeed();
      }

      async function deleteRuck(ruckId){
        if(!confirm("Delete this ruck? This cannot be undone."))return;
        await supabase.from("likes").delete().eq("ruck_id",ruckId);
        await supabase.from("comments").delete().eq("ruck_id",ruckId);
        const{data:r}=await supabase.from("rucks").select("miles").eq("id",ruckId).single();
        await supabase.from("rucks").delete().eq("id",ruckId);
        if(r){
          const newMiles=Math.max(0,(profile?.lifetime_miles||0)-(r.miles||0));
          await supabase.from("profiles").update({lifetime_miles:newMiles}).eq("id",session.user.id);
          setProfile(p=>({...p,lifetime_miles:newMiles}));
        }
        notify("🗑️ Ruck deleted","info");
        loadFeed();
      }

      async function updateRuck(ruckId, miles, weight, caption, ruckDate){
        const milesVal=toMiles(miles,du);
        const weightVal=toLbs(weight,wu);
        if(!milesVal||!weightVal){notify("⚠️ Enter distance and weight","error");return;}
        const updatePayload={miles:milesVal,weight:weightVal,caption};
        if(ruckDate){
          // Preserve existing time if available, just change the date
          const existing=editingRuck?.created_at;
          const time=existing?new Date(existing).toTimeString().slice(0,8):"12:00:00";
          updatePayload.created_at=`${ruckDate}T${time}`;
        }
        await supabase.from("rucks").update(updatePayload).eq("id",ruckId);
        notify("✅ Ruck updated!","success");
        setEditingRuck(null);
        loadFeed();
        challenges.forEach(ch=>loadChallengeProgress(ch));
      }

      async function loadChallengeProgress(ch){
        if(!session?.user?.id)return;
        setProgLoading(p=>({...p,[ch.id]:true}));
        let query=supabase.from("rucks").select("miles,weight,tonnage,created_at").eq("user_id",session.user.id);
        if(ch.start)query=query.gte("created_at",ch.start+"T00:00:00.000Z");
        if(ch.end)query=query.lte("created_at",ch.end+"T23:59:59.999Z");
        const{data,error}=await query;
        if(error){setProgLoading(p=>({...p,[ch.id]:false}));return;}
        const rows=data||[];
        const miles=rows.reduce((s,r)=>s+(r.miles||0),0);
        const tonnage=rows.reduce((s,r)=>s+(r.tonnage||0),0);
        const rucks=rows.length;
        const prog=ch.unit==="miles"?miles:ch.unit==="km"?miles*KM:ch.unit==="tonnage"?tonnage:ch.unit==="rucks"?rucks:miles;
        const pct=Math.min(100,(prog/(ch.goal||1))*100);
        setChallengeProgress(p=>({...p,[ch.id]:{miles,tonnage,rucks,prog,pct}}));
        setProgLoading(p=>({...p,[ch.id]:false}));
      }

      async function loadLeaderboards(){
        const[{data:ton},{data:mi}]=await Promise.all([supabase.from("leaderboard_tonnage").select("*").limit(10),supabase.from("leaderboard_monthly").select("*").limit(10)]);
        if(ton)setLbTon(ton);if(mi)setLbMi(mi);
      }

      async function loadChallengeLeaderboard(ch){
        // Get all members who have joined this challenge from DB
        const{data:joins}=await supabase.from("challenge_joins").select("user_id,profiles(id,username,full_name,avatar_emoji,is_admin)").eq("challenge_id",ch.id);
        if(!joins||joins.length===0){setChallengeLeaderboards(p=>({...p,[ch.id]:[]}));return;}
        const joinedUserIds=joins.map(j=>j.user_id);
        // Fetch rucks within the date window for ALL joined members
        let query=supabase.from("rucks").select("user_id,miles,weight,tonnage,created_at").in("user_id",joinedUserIds);
        if(ch.start)query=query.gte("created_at",ch.start+"T00:00:00");
        if(ch.end)query=query.lte("created_at",ch.end+"T23:59:59");
        const{data:rucks}=await query;
        const ruckRows=rucks||[];
        // Build per-user totals — include ALL joined members even with 0 rucks
        const byUser={};
        joins.forEach(j=>{
          if(!j.profiles)return;
          byUser[j.user_id]={id:j.user_id,username:j.profiles.username,full_name:j.profiles.full_name,avatar_emoji:j.profiles.avatar_emoji,is_admin:j.profiles.is_admin,miles:0,tonnage:0,rucks:0};
        });
        ruckRows.forEach(r=>{
          if(!byUser[r.user_id])return;
          byUser[r.user_id].miles+=(r.miles||0);
          byUser[r.user_id].tonnage+=(r.tonnage||0);
          byUser[r.user_id].rucks+=1;
        });
        const entries=Object.values(byUser).map(u=>{
          const prog=ch.unit==="miles"?u.miles:ch.unit==="km"?u.miles*KM:ch.unit==="tonnage"?u.tonnage:ch.unit==="rucks"?u.rucks:u.miles;
          return{...u,prog,pct:Math.min(100,(prog/ch.goal)*100)};
        }).sort((a,b)=>b.pct-a.pct);
        setChallengeLeaderboards(p=>({...p,[ch.id]:entries}));
      }

      useEffect(()=>{if(tab==="leaderboard"&&session){loadLeaderboards();challenges.forEach(ch=>loadChallengeLeaderboard(ch));}},[tab,session,challenges]);

      // ── EVENT HELPERS (Supabase-backed) ────────────────────
      async function loadEvents(){
        const{data:evRows}=await supabase.from("ruck_events").select("*").eq("active",true).order("event_date",{ascending:true});
        if(evRows){
          const mapped=evRows.map(r=>({
            id:r.id,title:r.title,desc:r.description,location:r.location,
            date:r.event_date,time:r.event_time,badge:r.badge||"🥾",
            active:r.active,createdBy:r.created_by,
            rsvps:r.rsvps?JSON.parse(r.rsvps):{yes:[],no:[],maybe:[]},
          }));
          setEvents(mapped);
        }
        const{data:penRows}=await supabase.from("ruck_event_suggestions").select("*").order("created_at",{ascending:false});
        if(penRows)setPendingEvents(penRows.map(r=>({id:r.id,title:r.title,desc:r.description,location:r.location,date:r.event_date,time:r.event_time,suggestedBy:r.suggested_by,suggestedByName:r.suggested_by_name})));
        // Load my RSVPs
        const{data:myRsvps}=await supabase.from("event_rsvps").select("event_id,answer").eq("user_id",session.user.id);
        if(myRsvps){const m={};myRsvps.forEach(r=>m[r.event_id]=r.answer);setEventRsvps(m);}
      }

      useEffect(()=>{if(session)loadEvents();},[session]);

      async function createEvent(f){
        const{data}=await supabase.from("ruck_events").insert({title:f.title,description:f.desc,location:f.location,event_date:f.date,event_time:f.time,badge:f.badge,active:true,created_by:session.user.id,rsvps:JSON.stringify({yes:[],no:[],maybe:[]})}).select().single();
        if(data){await loadEvents();notify("✅ Event posted!","success");addNotif(`New event: ${f.title} 📅 on ${f.date}`,"📅");}
        else notify("❌ Failed to post event","error");
      }

      async function suggestEvent(f){
        await supabase.from("ruck_event_suggestions").insert({title:f.title,description:f.desc,location:f.location,event_date:f.date,event_time:f.time,suggested_by:session.user.id,suggested_by_name:profile?.full_name||profile?.username});
        await loadEvents();
        notify("✅ Suggestion sent to admin!","success");
      }

      async function approveEvent(sug){
        await supabase.from("ruck_events").insert({title:sug.title,description:sug.desc,location:sug.location,event_date:sug.date,event_time:sug.time,badge:"🥾",active:true,created_by:session.user.id,rsvps:JSON.stringify({yes:[],no:[],maybe:[]})});
        await supabase.from("ruck_event_suggestions").delete().eq("id",sug.id);
        await loadEvents();
        notify("✅ Event approved and posted!","success");
        addNotif(`New event: ${sug.title} 📅 on ${sug.date}`,"📅");
      }

      async function rejectEvent(id){
        await supabase.from("ruck_event_suggestions").delete().eq("id",id);
        await loadEvents();
        notify("Suggestion removed","info");
      }

      async function rsvpEvent(evId,answer){
        const uid=session.user.id;
        const name=profile?.full_name||profile?.username||"Someone";
        // Upsert RSVP row
        await supabase.from("event_rsvps").upsert({event_id:evId,user_id:uid,answer},{onConflict:"event_id,user_id"});
        // Update the rsvps JSON blob on the event row
        const ev=events.find(e=>e.id===evId);
        if(ev){
          const r={yes:[...(ev.rsvps?.yes||[])],no:[...(ev.rsvps?.no||[])],maybe:[...(ev.rsvps?.maybe||[])]};
          ["yes","no","maybe"].forEach(k=>r[k]=r[k].filter(u=>u.id!==uid));
          r[answer].push({id:uid,name});
          await supabase.from("ruck_events").update({rsvps:JSON.stringify(r)}).eq("id",evId);
        }
        await loadEvents();
        setEventRsvps(p=>({...p,[evId]:answer}));
      }

      async function markEventDone(evId){
        await supabase.from("ruck_events").update({active:false}).eq("id",evId);
        await loadEvents();
        notify("Event marked as done","info");
      }

      async function deleteEvent(evId){
        await supabase.from("ruck_events").delete().eq("id",evId);
        await supabase.from("event_rsvps").delete().eq("event_id",evId);
        await loadEvents();
        notify("Event deleted","info");
      }

      // Active events — already filtered server-side, auto-expire by date client-side
      const activeEvents=events.filter(ev=>{
        if(!ev.active)return false;
        if(!ev.date)return true;
        return new Date(ev.date+"T23:59:59")>=new Date();
      });

      async function loadProfile(userId){
        setProfLoading(true);
        const[{data:prof},{data:rucks},{data:bdgs}]=await Promise.all([supabase.from("profiles").select("*").eq("id",userId).single(),supabase.from("rucks").select("*").eq("user_id",userId).order("created_at",{ascending:false}),supabase.from("badges").select("*").eq("user_id",userId)]);
        setProfData({prof,rucks:rucks||[],badges:bdgs||[]});
        setProfLoading(false);
      }
      useEffect(()=>{if(tab==="profile"){const uid=viewProf||session?.user?.id;if(uid)loadProfile(uid);}},[tab,viewProf,session]);
      // Load joined challenges from DB on login
      useEffect(()=>{
        if(!session?.user?.id)return;
        supabase.from("challenge_joins").select("challenge_id").eq("user_id",session.user.id).then(({data})=>{
          if(data)setJoined(data.map(r=>r.challenge_id));
        });
      },[session]);
      useEffect(()=>{if(tab==="challenges"&&session){challenges.forEach(ch=>{loadChallengeProgress(ch);loadChallengeLeaderboard(ch);});}},[tab,session,challenges]);

      const myPosts=posts.filter(p=>p.user_id===session?.user?.id);
      const myMiles=myPosts.reduce((s,p)=>s+(p.miles||0),0);
      const myTonnage=myPosts.reduce((s,p)=>s+(p.tonnage||0),0);
      const inp={width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 12px",color:C.white,fontSize:14,outline:"none"};
      const navItems=[{id:"feed",icon:"📋",label:"FEED"},{id:"log",icon:"➕",label:"LOG RUCK"},{id:"challenges",icon:"🎯",label:"CHALLENGES"},{id:"leaderboard",icon:"🏆",label:"LEADERS"},{id:"profile",icon:"🎒",label:"PROFILE"}];

      if(session===undefined)return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>;
      if(!session)return <AuthScreen onAuth={()=>supabase.auth.getSession().then(({data:{session}})=>setSession(session))}/>;

      return(
        <div style={{minHeight:"100vh",background:C.bg,color:C.white,width:"100%",maxWidth:480,margin:"0 auto",paddingBottom:80}}>
          {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
          {editingRuck&&<EditRuckModal ruck={editingRuck} du={du} wu={wu} onClose={()=>setEditingRuck(null)} onSave={updateRuck}/>}
          {showEventModal&&<EventModal onClose={()=>setShowEventModal(false)} onSave={f=>{createEvent(f);setShowEventModal(false);}}/>}
          {suggestEventModal&&<SuggestEventModal onClose={()=>setSuggestEventModal(false)} onSuggest={f=>{suggestEvent(f);setSuggestEventModal(false);}}/>}
          {showAdmin&&<AdminPanel session={session} profile={profile} notify={notify} challenges={challenges}
            onChallengeCreate={f=>{const nc={...f,id:`c_${Date.now()}`,goal:parseFloat(f.goal)};setChallenges(p=>[...p,nc]);notify("✅ Challenge created!","success");addNotif(`New challenge available: ${f.title} 🎯`,"🎯");}}
            onChallengeDelete={id=>setChallenges(p=>p.filter(c=>c.id!==id))}
            pendingEvents={pendingEvents} activeEvents={activeEvents}
            approveEvent={approveEvent} rejectEvent={rejectEvent}
            markEventDone={markEventDone} deleteEvent={deleteEvent}
            onCreateEvent={()=>{setShowAdmin(false);setShowEventModal(true);}}
            onClose={()=>setShowAdmin(false)}/>}

          {/* HEADER */}
          <div style={{background:"linear-gradient(180deg,#030b15,#07111f)",borderBottom:`1px solid ${C.border}`,padding:"10px 16px",position:"sticky",top:0,zIndex:100}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Logo size={46}/>
              <div>
                <div style={{fontFamily:"Impact,sans-serif",fontSize:20,color:C.white,letterSpacing:4,lineHeight:1}}>OCEAN CITY</div>
                <div style={{fontFamily:"Impact,sans-serif",fontSize:13,color:C.orange,letterSpacing:8,lineHeight:1}}>RUCKERS</div>
              </div>
              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
                <UnitToggle du={du} setDu={setDu} wu={wu} setWu={setWu}/>
                {/* Notification Bell */}
                <button onClick={()=>{setShowNotifs(p=>!p);setUnreadCount(0);setNotifications(p=>p.map(n=>({...n,read:true})));}} style={{position:"relative",background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",color:C.muted,fontSize:14,cursor:"pointer"}}>
                  🔔{unreadCount>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.red,color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{unreadCount>9?"9+":unreadCount}</span>}
                </button>
                {isAdmin&&<button onClick={()=>setShowAdmin(true)} style={{background:"linear-gradient(135deg,#600a0a,#3a0a0a)",border:"1px solid #c0281a",borderRadius:6,padding:"4px 8px",color:"#ff9999",fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:1}}>🔐 ADMIN</button>}
                <button onClick={()=>supabase.auth.signOut()} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",color:C.muted,fontSize:10,fontWeight:700,cursor:"pointer"}}>OUT</button>
              </div>
            </div>
          </div>

          {/* NOTIFICATION PANEL */}
          {showNotifs&&<div style={{position:"fixed",top:70,right:0,width:"min(360px,100vw)",maxHeight:"70vh",background:C.card,border:`1px solid ${C.border}`,borderRadius:"0 0 0 12px",zIndex:300,overflowY:"auto",boxShadow:"-4px 4px 20px rgba(0,0,0,0.5)"}}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontFamily:"Impact,sans-serif",fontSize:16,color:C.orange,letterSpacing:2}}>NOTIFICATIONS</div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={requestPushPermission} style={{background:C.blue,border:"none",borderRadius:6,padding:"4px 10px",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer"}}>📲 ENABLE PUSH</button>
                <button onClick={()=>setShowNotifs(false)} style={{background:"none",border:"none",color:C.muted,fontSize:18,cursor:"pointer"}}>✕</button>
              </div>
            </div>
            {notifications.length===0?<div style={{padding:24,textAlign:"center",color:C.dim,fontSize:13}}>No notifications yet 🔔</div>:notifications.map(n=>(
              <div key={n.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,background:n.read?"transparent":"rgba(26,95,168,0.08)",display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
                <div style={{flex:1}}><div style={{fontSize:12,color:C.white,lineHeight:1.5}}>{n.msg}</div><div style={{fontSize:10,color:C.dim,marginTop:3}}>{timeAgo(n.ts)}</div></div>
                {!n.read&&<div style={{width:6,height:6,borderRadius:"50%",background:C.blue,flexShrink:0,marginTop:4}}/>}
              </div>
            ))}
            {notifications.length>0&&<button onClick={()=>setNotifications([])} style={{width:"100%",background:"none",border:"none",borderTop:`1px solid ${C.border}`,padding:"10px",color:C.dim,fontSize:11,cursor:"pointer"}}>Clear all</button>}
          </div>}

          {/* FEED */}
          {tab==="feed"&&<div>
                        <div style={{borderBottom:`1px solid ${C.border}`,background:`linear-gradient(160deg,${C.navy},#091828)`}}>
              <div style={{background:`linear-gradient(90deg,${C.blue},${C.navy})`,padding:"5px 16px"}}><span style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"#fff"}}>📌 PINNED — COMMAND CENTRE</span></div>
              <div style={{padding:"14px 16px 12px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><Logo size={36}/><div><div style={{fontWeight:700,fontSize:14,color:C.white}}>Ocean City Ruckers</div><div style={{fontSize:11,color:C.muted}}>@ocr_official</div></div></div>
                <p style={{fontSize:14,lineHeight:1.6,color:"#ccd8e8",marginBottom:12}}>{announcement}</p>
                {/* Community Stats */}
                {(()=>{
                  const totMiles=posts.reduce((s,p)=>s+(p.miles||0),0);
                  const totTon=posts.reduce((s,p)=>s+(p.tonnage||0),0);
                  const totRucks=posts.length;
                  const members=new Set(posts.map(p=>p.user_id)).size;
                  return <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                    {[{icon:"📍",l:"TOTAL "+du.toUpperCase(),v:dispDist(totMiles,du)},{icon:"⚙️",l:"TOTAL TONNAGE",v:totTon>=1000?(totTon/1000).toFixed(1)+"k":totTon.toFixed(0)+" lbs"},{icon:"🎒",l:"RUCKS LOGGED",v:totRucks},{icon:"👥",l:"ACTIVE RUCKERS",v:members}].map(s=>(
                      <div key={s.l} style={{background:"rgba(0,0,0,0.3)",borderRadius:8,padding:"8px 4px",textAlign:"center",border:`1px solid ${C.border}`}}>
                        <div style={{fontSize:12,marginBottom:2}}>{s.icon}</div>
                        <div style={{fontFamily:"Impact,sans-serif",fontSize:14,color:C.orange,lineHeight:1}}>{s.v}</div>
                        <div style={{fontSize:7,color:C.muted,letterSpacing:0.5,marginTop:2}}>{s.l}</div>
                      </div>
                    ))}
                  </div>;
                })()}
              </div>
            </div>
            {/* PINNED EVENTS — below Command Centre */}
            {activeEvents.map(ev=>{
              const myRsvp=eventRsvps[ev.id];
              const yesCount=(ev.rsvps?.yes||[]).length;
              const noCount=(ev.rsvps?.no||[]).length;
              const maybeCount=(ev.rsvps?.maybe||[]).length;
              return <div key={ev.id} style={{borderBottom:`1px solid ${C.border}`,background:`linear-gradient(160deg,#0a1f10,#071810)`}}>
                <div style={{background:"linear-gradient(90deg,#1a8a3a,#0d5a28)",padding:"5px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"#fff"}}>📅 RUCK EVENT — PINNED</span>
                  {isAdmin&&<div style={{display:"flex",gap:6}}>
                    <button onClick={()=>markEventDone(ev.id)} style={{background:"none",border:"1px solid rgba(255,255,255,0.3)",borderRadius:4,padding:"2px 7px",color:"rgba(255,255,255,0.8)",fontSize:9,cursor:"pointer"}}>✅ DONE</button>
                    <button onClick={()=>deleteEvent(ev.id)} style={{background:"none",border:"1px solid rgba(255,255,255,0.3)",borderRadius:4,padding:"2px 7px",color:"rgba(255,255,255,0.8)",fontSize:9,cursor:"pointer"}}>🗑️</button>
                  </div>}
                </div>
                <div style={{padding:"14px 16px 12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div>
                      <div style={{fontFamily:"Impact,sans-serif",fontSize:20,color:"#f0eff0",letterSpacing:2}}>{ev.badge} {ev.title}</div>
                      <div style={{fontSize:12,color:"#7a9bbf",marginTop:2}}>📅 {ev.date}{ev.time&&` at ${ev.time}`}{ev.location&&` · 📍 ${ev.location}`}</div>
                    </div>
                  </div>
                  {ev.desc&&<p style={{fontSize:13,color:"#ccd8e8",lineHeight:1.6,marginBottom:12}}>{ev.desc}</p>}
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#7a9bbf",letterSpacing:2,marginBottom:8}}>WHO'S IN?</div>
                    <div style={{display:"flex",gap:6,marginBottom:10}}>
                      {[{k:"yes",label:"✅ YES",color:"#1a8a3a",bg:"rgba(26,138,58,0.15)"},{k:"no",label:"❌ NO",color:"#c0281a",bg:"rgba(192,40,26,0.1)"},{k:"maybe",label:"🤔 MAYBE",color:"#c8922a",bg:"rgba(200,146,42,0.1)"}].map(opt=>(
                        <button key={opt.k} onClick={()=>rsvpEvent(ev.id,opt.k)} style={{flex:1,background:myRsvp===opt.k?opt.bg:"none",border:`2px solid ${myRsvp===opt.k?opt.color:C.border}`,borderRadius:8,padding:"8px 4px",color:myRsvp===opt.k?opt.color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer",transition:"all 0.2s"}}>{opt.label}</button>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:8,marginBottom:6}}>
                      {[{k:"yes",label:"Going",count:yesCount,color:"#1a8a3a"},{k:"maybe",label:"Maybe",count:maybeCount,color:"#c8922a"},{k:"no",label:"Can't",count:noCount,color:"#c0281a"}].map(s=>(
                        <div key={s.k} style={{flex:1,background:C.bg,borderRadius:6,padding:"6px 4px",textAlign:"center",border:`1px solid ${C.border}`}}>
                          <div style={{fontFamily:"Impact,sans-serif",fontSize:16,color:s.color}}>{s.count}</div>
                          <div style={{fontSize:8,color:C.muted,letterSpacing:1}}>{s.label.toUpperCase()}</div>
                        </div>
                      ))}
                    </div>
                    {(ev.rsvps?.yes||[]).length>0&&<div style={{fontSize:11,color:"#1a8a3a",marginBottom:2}}>✅ {(ev.rsvps.yes||[]).map(u=>u.name).join(", ")}</div>}
                    {(ev.rsvps?.maybe||[]).length>0&&<div style={{fontSize:11,color:"#c8922a",marginBottom:2}}>🤔 {(ev.rsvps.maybe||[]).map(u=>u.name).join(", ")}</div>}
                  </div>
                  <button onClick={()=>{setLogForm(p=>({...p,linkedId:ev.id,linkedType:"event"}));setTab("log");}} style={{width:"100%",background:"linear-gradient(135deg,#1a8a3a,#0d5a28)",border:"none",borderRadius:7,padding:"9px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:13,letterSpacing:2,cursor:"pointer"}}>LOG A RUCK FOR THIS EVENT 🎒</button>
                </div>
              </div>;
            })}

            {/* Suggest event button for members */}
            <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:8}}>
              {isAdmin&&<button onClick={()=>setShowEventModal(true)} style={{flex:1,background:"linear-gradient(135deg,#1a8a3a,#0d5a28)",border:"none",borderRadius:8,padding:"10px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:13,letterSpacing:2,cursor:"pointer"}}>📅 POST EVENT</button>}
              {!isAdmin&&<button onClick={()=>setSuggestEventModal(true)} style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px",color:C.muted,fontFamily:"Impact,sans-serif",fontSize:12,letterSpacing:2,cursor:"pointer"}}>💡 SUGGEST A RUCK EVENT</button>}
            </div>

            {feedLoading?<Spinner/>:posts.length===0?<div style={{textAlign:"center",padding:40}}><div style={{fontSize:40,marginBottom:12}}>🎒</div><div style={{fontFamily:"Impact,sans-serif",fontSize:18,letterSpacing:2,color:C.muted}}>NO RUCKS YET — BE FIRST!</div></div>:posts.map(post=>{
              const liked=post.likes?.some(l=>l.user_id===session.user.id);
              return(
                <div key={post.id} style={{borderBottom:`1px solid ${C.border}`,background:C.bg,animation:"fi 0.35s ease"}}>
                  <div style={{padding:"14px 16px 12px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <div onClick={()=>{setViewProf(post.user_id);setTab("profile");}} style={{cursor:"pointer"}}><Av emoji={post.profiles?.avatar_emoji} size={42}/></div>
                      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:C.white}}>{post.profiles?.full_name||post.profiles?.username}</div><div style={{fontSize:11,color:C.muted}}>@{post.profiles?.username} · {timeAgo(post.created_at)}</div></div>
                      {(post.user_id===session.user.id||isAdmin)&&<div style={{display:"flex",gap:6,flexShrink:0}}>
                        {post.user_id===session.user.id&&<button onClick={()=>setEditingRuck(post)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 9px",color:C.muted,fontSize:11,cursor:"pointer"}}>✏️</button>}
                        <button onClick={()=>deleteRuck(post.id)} style={{background:"none",border:"1px solid rgba(192,40,26,0.4)",borderRadius:6,padding:"4px 9px",color:"#c0281a",fontSize:11,cursor:"pointer"}}>🗑️</button>
                      </div>}
                    </div>
                    {post.linked_id&&<div style={{display:"inline-flex",alignItems:"center",gap:5,background:"rgba(26,95,168,0.12)",border:"1px solid rgba(26,95,168,0.3)",borderRadius:20,padding:"3px 10px",marginBottom:8,fontSize:11,color:C.wave}}>
                      🔗 {post.linked_type==="event"?(activeEvents.find(e=>e.id===post.linked_id)?.title||"Event"):(challenges.find(c=>c.id===post.linked_id)?.title||"Challenge")}
                    </div>}
                    <p style={{fontSize:14,lineHeight:1.55,color:"#ccd8e8",marginBottom:10}}>{post.caption}</p>
                    <PhotoStrip post={post}/>
                    <div style={{display:"flex",gap:7,marginBottom:10}}>
                      {[{l:du.toUpperCase(),v:dispDist(post.miles,du),a:false},{l:wu.toUpperCase(),v:dispW(post.weight,wu),a:false},{l:"TONNAGE",v:dispW(post.miles*post.weight,wu)+" "+wu,a:true}].map(s=>(
                        <div key={s.l} style={{flex:1,textAlign:"center",padding:"7px 5px",borderRadius:7,background:s.a?"rgba(212,96,26,0.12)":C.card,border:`1px solid ${s.a?C.orange:C.border}`}}>
                          <div style={{fontWeight:900,fontSize:15,color:s.a?C.orange:C.wave,lineHeight:1}}>{s.v}</div>
                          <div style={{fontSize:8,color:C.muted,letterSpacing:1,marginTop:2}}>{s.l}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:16,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
                      <button onClick={()=>toggleLike(post)} style={{background:"none",border:"none",cursor:"pointer",color:liked?C.orange:C.dim,fontSize:13,fontWeight:700}}>🎒 {post.likes?.length||0}</button>
                      <button onClick={()=>setExpandedCmts(p=>({...p,[post.id]:!p[post.id]}))} style={{background:"none",border:"none",cursor:"pointer",color:C.dim,fontSize:13,fontWeight:600}}>💬 {post.comments?.length||0}</button>
                    </div>
                    {expandedCmts[post.id]&&<div style={{marginTop:8}}>
                      {(post.comments||[]).map(c=><div key={c.id} style={{display:"flex",gap:6,marginBottom:5,alignItems:"flex-start"}}><Av emoji={c.profiles?.avatar_emoji} size={22}/><div><span style={{fontSize:11,fontWeight:700,color:C.wave}}>@{c.profiles?.username} </span><span style={{fontSize:12,color:"#8aa8c8"}}>{c.text}</span></div></div>)}
                      <div style={{display:"flex",gap:8,marginTop:8}}>
                        <input value={cmtInputs[post.id]||""} onChange={e=>setCmtInputs(p=>({...p,[post.id]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addComment(post.id)} placeholder="Add a comment…" style={{...inp,padding:"7px 12px",fontSize:12,borderRadius:20,flex:1}}/>
                        <button onClick={()=>addComment(post.id)} style={{background:C.blue,border:"none",borderRadius:20,padding:"7px 14px",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>POST</button>
                      </div>
                    </div>}
                  </div>
                </div>
              );
            })}
          </div>}

          {/* LOG RUCK */}
          {tab==="log"&&<div style={{padding:20,animation:"fi 0.35s ease"}}>
            <div style={{fontFamily:"Impact,sans-serif",fontSize:28,color:C.orange,letterSpacing:4,marginBottom:2}}>LOG A RUCK</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:14,letterSpacing:1}}>DISTANCE × WEIGHT = TONNAGE</div>
            <div style={{background:`linear-gradient(135deg,#0e2030,#091828)`,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",marginBottom:18}}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:22,flexShrink:0}}>📸</span>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:C.white,marginBottom:4}}>Log your route</div>
                  <div style={{fontSize:12,color:"#8aa8c8",lineHeight:1.6}}>Complete your ruck, then upload a photo or screenshot of your route from Strava, Garmin, Apple Maps or Google Maps below. Enter your distance and pack weight to log it to the feed.</div>
                </div>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>DATE OF RUCK</label>
              <input type="date" value={logForm.ruckDate} max={new Date().toLocaleDateString("en-CA")} onChange={e=>setLogForm(p=>({...p,ruckDate:e.target.value}))} style={{...inp,colorScheme:"dark"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
              {[{k:"miles",l:`DISTANCE (${du.toUpperCase()})`,ph:"3.5",u:du},{k:"weight",l:`PACK WEIGHT (${wu.toUpperCase()})`,ph:"30",u:wu}].map(f=>(
                <div key={f.k}>
                  <label style={{display:"block",fontWeight:700,fontSize:10,color:C.wave,letterSpacing:2,marginBottom:5}}>{f.l}</label>

                <span style={{fontSize:22}}>📷</span>
                <div><div style={{fontSize:13,color:C.muted}}>{logForm.photos.length>0?`${logForm.photos.length} photo${logForm.photos.length>1?"s":""}  selected ✅`:"Tap to add photos"}</div><div style={{fontSize:10,color:C.dim,marginTop:2}}>Add up to 5 — route screenshots, ruck pics, anything</div></div>

                  const files=Array.from(e.target.files).slice(0,5);
                  const previews=[];
                  let loaded=0;
                  files.forEach((f,i)=>{const r=new FileReader();r.onload=ev=>{previews[i]=ev.target.result;loaded++;if(loaded===files.length)setLogForm(p=>({...p,photos:previews,photoFiles:files}));};r.readAsDataURL(f);});
                }}/>
              </label>
              {logForm.photos.length>0&&<div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
                {logForm.photos.map((src,i)=>(
                  <div key={i} style={{position:"relative",flexShrink:0}}>
                    <img src={src} alt="" style={{width:100,height:80,objectFit:"cover",borderRadius:8,border:`1px solid ${C.border}`}}/>
                    <button onClick={()=>setLogForm(p=>({...p,photos:p.photos.filter((_,j)=>j!==i),photoFiles:p.photoFiles.filter((_,j)=>j!==i)}))} style={{position:"absolute",top:2,right:2,background:"rgba(0,0,0,0.7)",border:"none",borderRadius:"50%",width:18,height:18,color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                  </div>
                ))}
              </div>}
            </div>
            <button onClick={()=>submitRuck()} disabled={logLoading} style={{width:"100%",background:`linear-gradient(135deg,${C.orange},#a03a0a)`,border:"none",borderRadius:8,padding:"16px",color:"#fff",fontFamily:"Impact,sans-serif",fontSize:22,letterSpacing:4,cursor:logLoading?"not-allowed":"pointer",opacity:logLoading?0.7:1,boxShadow:"0 4px 20px rgba(212,96,26,0.35)"}}>

          {/* CHALLENGES */}

              </div>
            </div>
            <div style={{fontSize:12,color:C.muted,marginBottom:20,letterSpacing:1}}>JOIN A CHALLENGE AND EARN BADGES</div>
            {challenges.length===0?<div style={{textAlign:"center",padding:30,color:C.dim}}><div style={{fontSize:32,marginBottom:8}}>🎯</div><div>No active challenges yet</div></div>:challenges.map(ch=>{
              const isJoined=joined.includes(ch.id);
              const now=new Date();
              const isExpired=ch.end&&new Date(ch.end)<now;
              // Use DB-backed progress — always accurate regardless of feed state
              const cpData=challengeProgress[ch.id]||{prog:0,pct:0};
